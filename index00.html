<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>逐語録 Pro - Zero Drop (安定・Edge対応版)</title>
    <style>
        :root { --bg: #0d1117; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; --danger: #f85149; --success: #238636; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .toolbar { background: #161b22; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .tool-group { display: flex; align-items: center; gap: 5px; }
        label { font-size: 11px; color: #8b949e; }
        button, select { background: #21262d; color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #btn-start { background: var(--success); color: white; border: none; font-weight: bold; }
        #btn-stop { background: var(--danger); color: white; border: none; }
        .filter-toggle { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #adbac7; background: #222; padding: 5px 10px; border-radius: 20px; border: 1px solid #444; }
        
        #log-screen { flex: 1; padding: 20px 30px; overflow-y: auto; font-size: 18px; line-height: 1.6; border-bottom: 1px solid var(--border); }
        #interim-area { padding: 15px 30px; min-height: 3em; background: #0d1117; font-size: 18px; line-height: 1.6; }
        
        .block { margin-bottom: 0.8em; border-left: 2px solid var(--accent); padding-left: 12px; min-height: 1.6em; word-break: break-all; }
        .interim { color: #8b949e; font-style: italic; }
        .monitor { background: #010409; padding: 8px 20px; border-top: 1px solid var(--border); }
        .meter-bg { height: 3px; background: #333; border-radius: 2px; margin: 5px 0; }
        #meter-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.1s ease-out; }
        #status-bar { display: space-between; font-size: 10px; color: #6e7681; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="tool-group">
        <label>入力:</label>
        <select id="mic-select"><option>読み込み中...</option></select>
    </div>
    <div class="tool-group">
        <label>感度:</label>
        <select id="boost-select">
            <option value="1.0">1.0</option>
            <option value="2.0" selected>2.0</option>
            <option value="4.0">4.0</option>
            <option value="8.0">8.0</option>
            <option value="12.0">12.0</option>
        </select>
    </div>
    <div class="filter-toggle">
        <input type="checkbox" id="bgm-filter" checked>
        <label for="bgm-filter">ノイズ除去</label>
    </div>
    <button id="btn-start" disabled>開始</button>
    <button id="btn-stop" disabled>停止</button>
    <div style="margin-left: auto; display: flex; gap: 8px;">
        <button onclick="resetPermissions()">権限リセット</button>
        <button onclick="copyAll()">コピー</button>
        <button onclick="clearAll()" style="color: var(--danger);">クリア</button>
    </div>
</div>

<div id="log-screen"></div>

<div id="interim-area">
    <div id="active-line" class="block interim">ここに認識結果が表示されます...</div>
</div>

<div class="monitor">
    <div id="status-bar">
        <span id="engine-status">READY</span>
        <span id="mode-status" style="color: var(--accent);">ULTRA-LOW LATENCY</span>
    </div>
    <div class="meter-bg"><div id="meter-fill"></div></div>
</div>

<script>
    let recognition = null;
    let isRunning = false;
    let audioCtx = null, stream = null, source = null, analyser = null;
    let animationFrameId = null;
    let restartTimeoutId = null;
    let multiplier = 2.0;

    function resetPermissions() { window.location.reload(); }

    async function init() {
        const sel = document.getElementById('mic-select');
        try {
            const temp = await navigator.mediaDevices.getUserMedia({ audio: true });
            temp.getTracks().forEach(t => t.stop());
            await refreshDevices();
            document.getElementById('btn-start').disabled = false;
        } catch (e) { 
            document.getElementById('engine-status').innerText = "MIC ERROR"; 
        }
    }

    async function refreshDevices() {
        const sel = document.getElementById('mic-select');
        try {
            const devs = await navigator.mediaDevices.enumerateDevices();
            const currentVal = sel.value;
            sel.innerHTML = '';
            devs.filter(d => d.kind === 'audioinput').forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.text = d.label || `Mic ${i + 1}`;
                sel.appendChild(opt);
            });
            if(currentVal && Array.from(sel.options).some(o => o.value === currentVal)) {
                sel.value = currentVal;
            }
        } catch(e) { console.error(e); }
    }

    function addFinalBlock(text) {
        let cleanedText = text.trim();
        if (!cleanedText) return;

        // index02由来：高度なフィラー除去
        const fillerRegex = /^(えーと|えーっと|えー、|あのー|あの、|えー|あの|まー|うーん)/g;
        cleanedText = cleanedText.replace(fillerRegex, "").replace(/[、\s](えーと|えーっと|えー、|あのー|あの、|えー|あの)[、\s]?/g, " ").trim();
        if (cleanedText === "") return;

        const screen = document.getElementById('log-screen');
        
        // 重複ガード
        if (screen.lastElementChild && (screen.lastElementChild.innerText === cleanedText || screen.lastElementChild.innerText === cleanedText + "。")) return;

        const newBlock = document.createElement('div');
        newBlock.className = 'block';

        // index02由来：句読点スマート付与
        const hasPunctuation = /[。？！\?\!]$/.test(cleanedText);
        newBlock.innerText = cleanedText + (hasPunctuation ? "" : "。");
        
        screen.appendChild(newBlock);

        requestAnimationFrame(() => {
            screen.scrollTop = screen.scrollHeight;
        });
    }

    function setupRecognition() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return null;

        const rec = new Speech();
        rec.lang = 'ja-JP';
        rec.continuous = true;
        rec.interimResults = true;

        rec.onstart = () => {
            document.getElementById('engine-status').innerText = "LIVE";
        };

        rec.onresult = (e) => {
            const activeLine = document.getElementById('active-line');
            let interimStr = "";

            for (let i = e.resultIndex; i < e.results.length; i++) {
                if (e.results[i].isFinal) {
                    addFinalBlock(e.results[i][0].transcript);
                } else {
                    interimStr += e.results[i][0].transcript;
                }
            }
            
            const nextText = interimStr || "...";
            if (activeLine.innerText !== nextText) {
                activeLine.innerText = nextText;
            }
        };

        // index02の最重要変更点：高速再起動によるEdgeクラッシュを完全に防ぐ300ms安全弁
        rec.onend = () => {
            if (isRunning) {
                clearTimeout(restartTimeoutId);
                restartTimeoutId = setTimeout(() => {
                    if (isRunning && recognition) {
                        try { recognition.start(); } catch(err) { console.warn("再起動失敗:", err); }
                    }
                }, 300);
            }
        };

        rec.onerror = (ev) => {
            if (ev.error !== 'no-speech') console.warn("認識エラー:", ev.error);
        };

        recognition = rec;
        return rec;
    }

    async function stopMedia() {
        isRunning = false;
        clearTimeout(restartTimeoutId);
        if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }

        if (recognition) {
            recognition.onend = null;
            try { recognition.stop(); } catch(e){}
            recognition = null;
        }
        if (source) { try { source.disconnect(); } catch(e){} source = null; }
        if (analyser) { try { analyser.disconnect(); } catch(e){} analyser = null; }
        if (audioCtx) { try { await audioCtx.close(); } catch(e){} audioCtx = null; }
        if (stream) { stream.getTracks().forEach(t => { try { t.stop(); } catch(e){} }); stream = null; }
    }

    // index02由来：ScriptProcessorを廃止した超軽量・高追従ボリュームメーター
    function updateVolumeMeter() {
        if (!isRunning || !analyser) return;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
        
        const meterFill = document.getElementById('meter-fill');
        meterFill.style.width = Math.min(100, avg * multiplier * 2) + "%"; // index00のスケール感に調整
        animationFrameId = requestAnimationFrame(updateVolumeMeter);
    }

    async function startStream() {
        const deviceId = document.getElementById('mic-select').value;
        const filterActive = document.getElementById('bgm-filter').checked;

        const constraints = {
            audio: {
                deviceId: deviceId ? { exact: deviceId } : undefined,
                echoCancellation: true,
                noiseSuppression: filterActive,
                autoGainControl: true
            }
        };

        stream = await navigator.mediaDevices.getUserMedia(constraints);
        await refreshDevices();

        // 認識エンジンのセットアップ
        const rec = setupRecognition();
        if (rec) rec.start();

        // オーディオ環境の初期化（ScriptProcessorを使わないクリーン接続）
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256; 

        source.connect(analyser);
        
        updateVolumeMeter();
    }

    document.getElementById('btn-start').onclick = async () => {
        try {
            document.getElementById('btn-start').disabled = true;
            document.getElementById('engine-status').innerText = "CONNECTING";
            isRunning = true;
            
            multiplier = parseFloat(document.getElementById('boost-select').value);
            await startStream();
            
            document.getElementById('btn-stop').disabled = false;
        } catch (err) {
            console.error(err);
            document.getElementById('engine-status').innerText = "ERROR";
            document.getElementById('btn-start').disabled = false;
            isRunning = false;
        }
    };

    document.getElementById('btn-stop').onclick = async () => {
        document.getElementById('btn-stop').disabled = true;
        await stopMedia();
        
        document.getElementById('btn-start').disabled = false;
        document.getElementById('meter-fill').style.width = "0%";
        document.getElementById('engine-status').innerText = "STOPPED";
        document.getElementById('active-line').innerText = "停止中";
    };

    document.getElementById('boost-select').onchange = () => {
        multiplier = parseFloat(document.getElementById('boost-select').value);
    };

    // デバイスやノイズ除去の切り替え時も安全に再接続するロジック
    document.getElementById('mic-select').onchange = async () => {
        if (isRunning) {
            document.getElementById('engine-status').innerText = "RECONNECTING";
            await stopMedia();
            isRunning = true;
            await startStream();
        }
    };

    document.getElementById('bgm-filter').onchange = async () => {
        if (isRunning) {
            document.getElementById('engine-status').innerText = "FILTERING";
            await stopMedia();
            isRunning = true;
            await startStream();
        }
    };

    function clearAll() { 
        if(!confirm("ログを削除しますか？")) return;
        document.getElementById('log-screen').innerHTML = ''; 
        document.getElementById('active-line').innerText = "...";
    }
    
    function copyAll() {
        const text = Array.from(document.querySelectorAll('#log-screen .block')).map(b => b.innerText).join('\n');
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
            const originalText = document.getElementById('engine-status').innerText;
            document.getElementById('engine-status').innerText = "COPIED!";
            setTimeout(() => document.getElementById('engine-status').innerText = originalText, 1500);
        });
    }

    window.onload = init;
</script>
</body>
</html>
