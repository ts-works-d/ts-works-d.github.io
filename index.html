<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逐語録（完全制御ハイブリッド版）</title>
    <style>
        :root { --primary: #007bff; --danger: #dc3545; --success: #28a745; --warning: #ffc107; --secondary: #6c757d; --info: #17a2b8; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; background: #f4f7f9; max-width: 1100px; margin: auto; color: #333; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .main-panel { flex: 1; min-width: 320px; }
        .log-panel { width: 300px; min-width: 250px; display: flex; flex-direction: column; }
        .card { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); height: fit-content; }
        h2 { margin: 0 0 15px; font-size: 1.2em; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .conn-status { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; font-weight: bold; font-size: 0.9em; }
        .indicator { width: 12px; height: 12px; border-radius: 50%; background: #ccc; }
        .online { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .connecting { background: var(--warning); animation: blink 1s infinite; }
        .error { background: var(--danger); }
        @keyframes blink { 50% { opacity: 0.5; } }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 16px; background: #fff; cursor: pointer; }
        .setting-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #eee; }
        .setting-label { display: flex; justify-content: space-between; font-size: 0.85em; font-weight: bold; color: #555; align-items: center; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        button { flex: 1; min-width: 80px; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; transition: 0.2s; color: white; }
        #start { background: var(--primary); }
        #stop { background: var(--danger); }
        #copy { background: var(--info); }
        #save { background: var(--success); }
        #clear { background: var(--secondary); }
        button:disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.6; }
        .status-area { font-size: 0.85em; text-align: center; margin-bottom: 15px; padding: 8px; background: #fff3cd; border-radius: 6px; color: #856404; min-height: 1.2em; }
        #output-box { width: 100%; height: 450px; padding: 20px; border-radius: 12px; border: 1px solid #eef; background: #fdfdfd; overflow-y: auto; line-height: 1.8; font-size: 16px; box-sizing: border-box; }
        #final-span { color: #222; white-space: pre-wrap; }
        #interim-span { color: #999; font-style: italic; }
        .log-area { flex-grow: 1; height: 600px; padding: 15px; border-radius: 12px; border: 1px solid #ddd; background: #222; color: #00ff00; font-family: 'Courier New', Courier, monospace; font-size: 12px; overflow-y: auto; box-sizing: border-box; }
        .log-entry { margin-bottom: 5px; border-left: 2px solid #444; padding-left: 8px; }
        .log-time { color: #888; margin-right: 5px; }

        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(14px); }
    </style>
</head>
<body>

<div class="container">
    <div class="main-panel">
        <div class="card">
            <h2>逐語録（完全制御ハイブリッド版）</h2>
            <div class="conn-status">
                <div id="indicator" class="indicator"></div>
                <span id="conn-text">音声認識：待機中</span>
            </div>
            <select id="mic-select">
                <option value="">-- マイクを選択（変更時に即反映） --</option>
            </select>
            <div class="setting-box">
                <div class="setting-label" style="margin-bottom: 12px;">
                    <span>感度調整（倍率）</span>
                    <select id="gain-select" style="width: auto; margin-bottom: 0; padding: 5px 10px; font-size: 14px;">
                        <option value="1">1 (標準)</option>
                        <option value="2" selected>2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10 (最大)</option>
                    </select>
                </div>
                <div class="setting-label">
                    <span>ノイズ軽減（選択マイクへ適用）</span>
                    <label class="switch">
                        <input type="checkbox" id="noise-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="controls">
                <button id="start">認識開始</button>
                <button id="stop" disabled>停止</button>
                <button id="copy">コピー</button>
                <button id="save">保存</button>
                <button id="clear">クリア</button>
            </div>
            <div class="status-area" id="status-display">「認識開始」を押してください。</div>
            <div id="output-box"><span id="final-span"></span><span id="interim-span"></span></div>
        </div>
    </div>
    <div class="log-panel">
        <div class="card" style="height: 100%;">
            <h2>認識中ログ</h2>
            <div id="log-area" class="log-area"></div>
        </div>
    </div>
</div>

<script>
    const micSelect = document.getElementById('mic-select');
    const gainSelect = document.getElementById('gain-select');
    const noiseToggle = document.getElementById('noise-toggle');
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const copyBtn = document.getElementById('copy');
    const saveBtn = document.getElementById('save');
    const clearBtn = document.getElementById('clear');
    const finalSpan = document.getElementById('final-span');
    const interimSpan = document.getElementById('interim-span');
    const outputBox = document.getElementById('output-box');
    const logArea = document.getElementById('log-area');
    const statusDisp = document.getElementById('status-display');
    const indicator = document.getElementById('indicator');
    const connText = document.getElementById('conn-text');

    let recognition = null;
    let audioContext = null;
    let currentStream = null;
    let gainNode = null;
    let analyserNode = null;
    let scriptNode = null;
    let isActive = false;
    let isSpeechDetected = false;
    let silenceTimer = null;
    let lastFinalText = "";

    function addLog(text, isFinal) {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const timeStr = new Date().toLocaleTimeString();
        entry.innerHTML = `<span class="log-time">[${timeStr}]</span><span>${isFinal ? '<b>[確定]</b> ' : ''}${text}</span>`;
        logArea.appendChild(entry);
        logArea.scrollTop = logArea.scrollHeight;
        if (logArea.childNodes.length > 40) logArea.removeChild(logArea.firstChild);
    }

    function updateStatus(type, msg) {
        statusDisp.innerText = msg;
        indicator.className = "indicator " + type;
        if(type === 'online') { 
            connText.innerText = "音声認識：連動稼働中"; 
            statusDisp.style.background = "#d4edda"; 
        } else if(type === 'error') { 
            connText.innerText = "音声認識：エラー"; 
            statusDisp.style.background = "#f8d7da"; 
        } else { 
            connText.innerText = "音声認識：待機中"; 
            statusDisp.style.background = "#fff3cd"; 
        }
    }

    async function refreshDevices() {
        try {
            if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return;
            const devices = await navigator.mediaDevices.enumerateDevices();
            const audioInputs = devices.filter(d => d.kind === 'audioinput');
            const currentVal = micSelect.value;
            micSelect.innerHTML = '';
            
            audioInputs.forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = d.deviceId; 
                opt.text = d.label || `マイク ${i + 1}`;
                micSelect.appendChild(opt);
            });
            if(currentVal && Array.from(micSelect.options).some(o => o.value === currentVal)) {
                micSelect.value = currentVal;
            }
        } catch (e) { console.error(e); }
    }

    async function cleanupAudioPipeline() {
        if (scriptNode) { scriptNode.disconnect(); scriptNode = null; }
        if (analyserNode) { analyserNode.disconnect(); analyserNode = null; }
        if (gainNode) { gainNode.disconnect(); gainNode = null; }
        if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
        if (audioContext) { if (audioContext.state !== 'closed') await audioContext.close(); audioContext = null; }
    }

    // マイク・感度・ノイズの選択値を100%反映したオーディオ回路を構築
    async function setupAudioPipeline() {
        await cleanupAudioPipeline();

        const selectedMicId = micSelect.value;
        const constraints = {
            audio: {
                deviceId: selectedMicId ? { exact: selectedMicId } : undefined,
                echoCancellation: true,
                noiseSuppression: noiseToggle.checked,
                autoGainControl: false
            }
        };

        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        const source = audioContext.createMediaStreamSource(currentStream);
        gainNode = audioContext.createGain();
        
        // 選択された「感度（倍率）」を物理音声波形に直撃反映
        gainNode.gain.value = parseFloat(gainSelect.value) || 2.0;

        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 256;

        scriptNode = audioContext.createScriptProcessor(2048, 1, 1);
        
        // 加工が終わった音声の音量（RMS）を監視して、認識処理のON/OFFを動的に完全制御
        scriptNode.onaudioprocess = () => {
            if (!isActive) return;
            const array = new Float32Array(analyserNode.fftSize);
            analyserNode.getFloatTimeDomainData(array);
            
            let sum = 0;
            for (let i = 0; i < array.length; i++) {
                sum += array[i] * array[i];
            }
            const rms = Math.sqrt(sum / array.length);

            // 閾値（音量が一定以上＝発話中と判定）
            if (rms > 0.01) {
                if (!isSpeechDetected) {
                    isSpeechDetected = true;
                    startSpeechRecognitionEngine(); // 声を検知したらエンジンを即座に結合
                }
                clearTimeout(silenceTimer);
                silenceTimer = null;
            } else {
                // 音が途切れてから450ms後に、Androidのバッファを強制廃棄（多重表示・フリーズを完全根絶）
                if (isSpeechDetected && !silenceTimer) {
                    silenceTimer = setTimeout(() => {
                        isSpeechDetected = false;
                        stopSpeechRecognitionEngine();
                    }, 450);
                }
            }
        };

        source.connect(gainNode);
        gainNode.connect(analyserNode);
        analyserNode.connect(scriptNode);
        scriptNode.connect(audioContext.destination);
    }

    function startSpeechRecognitionEngine() {
        if (recognition || !isActive) return;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return;

        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = false; // 1単語・1文ごとにバッファをクリーンにするためfalse

        recognition.onresult = (e) => {
            let interimText = '';
            for (let i = e.resultIndex; i < e.results.length; i++) {
                let result = e.results[i];
                if (result.isFinal) {
                    let cleanedText = result[0].transcript.trim();
                    const fillerRegex = /^(えーと|えーっと|えー、|あのー|あの、|えー|あの|まー)/g;
                    cleanedText = cleanedText.replace(fillerRegex, "").trim();
                    
                    if (cleanedText === "" || cleanedText === lastFinalText) continue;
                    lastFinalText = cleanedText;

                    const currentFinal = finalSpan.innerText.trim();
                    let separator = currentFinal !== "" ? "\n" : "";
                    if (!/[。？！?!]$/.test(cleanedText)) cleanedText += "。";

                    finalSpan.innerText += separator + cleanedText;
                    addLog(cleanedText, true);
                    interimText = '';
                } else {
                    interimText += result[0].transcript;
                }
            }
            interimSpan.innerText = interimText;
            if (interimText.trim() !== "") {
                addLog(interimText, false);
            }
            outputBox.scrollTop = outputBox.scrollHeight;
        };

        recognition.onerror = () => {};
        recognition.onend = () => { recognition = null; };

        try { recognition.start(); } catch(e) {}
    }

    // 音が途切れた瞬間に、認識途中の壊れたバッファごと「強制破棄」してAndroidの増殖を防ぐ
    function stopSpeechRecognitionEngine() {
        if (recognition) {
            try {
                recognition.abort(); // stopではなくabortを使うことで、古いバッファを完全に消し去ります
            } catch(e) {}
            recognition = null;
        }
        interimSpan.innerText = "";
    }

    startBtn.onclick = async () => {
        isActive = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        lastFinalText = "";
        updateStatus('connecting', "指定構成でシステムをロック中...");

        try {
            await setupAudioPipeline();
            updateStatus('online', "システム完全連動：お話しください。");
        } catch (err) {
            console.error(err);
            updateStatus('error', "起動失敗。マイクの許可、または接続を確認してください。");
            startBtn.disabled = false;
            stopBtn.disabled = true;
            isActive = false;
        }
    };

    stopBtn.onclick = async () => {
        isActive = false;
        clearTimeout(silenceTimer);
        startBtn.disabled = false;
        stopBtn.disabled = true;
        updateStatus('', "停止しました。");
        stopSpeechRecognitionEngine();
        await cleanupAudioPipeline();
    };

    micSelect.onchange = async () => {
        if (isActive) {
            updateStatus('connecting', "マイク切替中...");
            await setupAudioPipeline();
            updateStatus('online', "マイク切替完了：お話しください。");
        }
    };

    // 【完全連動】感度変更：不要なログは一切出力せず、GainNodeの倍率のみをリアルタイムに直撃書き換え
    gainSelect.onchange = () => {
        const newVal = parseFloat(gainSelect.value) || 2.0;
        if (gainNode && audioContext) {
            gainNode.gain.setValueAtTime(newVal, audioContext.currentTime);
        }
    };

    noiseToggle.onchange = async () => {
        if (isActive) {
            updateStatus('connecting', "ノイズ処理変更中...");
            await setupAudioPipeline();
            updateStatus('online', "変更完了：お話しください。");
        }
    };

    copyBtn.onclick = async () => {
        const text = finalSpan.innerText;
        if (!text.trim()) return;
        try {
            await navigator.clipboard.writeText(text);
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "コピー完了！";
            setTimeout(() => copyBtn.innerText = originalText, 2000);
        } catch (err) {
            alert("長押ししてコピーしてください：\n\n" + text);
        }
    };

    saveBtn.onclick = () => {
        const text = finalSpan.innerText;
        if (!text.trim()) return;
        const now = new Date();
        const timestamp = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + '_' + String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0');
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `逐語録_${timestamp}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    };

    clearBtn.onclick = () => {
        if (confirm("テキストをすべて消去しますか？")) {
            finalSpan.innerText = ""; interimSpan.innerText = ""; logArea.innerHTML = "";
            lastFinalText = "";
        }
    };

    window.onload = async () => {
        try {
            const initStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            await refreshDevices();
            initStream.getTracks().forEach(t => t.stop());
        } catch(e){}
    };
</script>
</body>
</html>
