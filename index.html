<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>超安定文字起こしツール (音量ブースト機能付き)</title>
    <style>
        :root {
            --bg-color: #f1f3f5;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #ced4da;
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --secondary: #6c757d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body, html {
            height: 100%;
            height: 100dvh;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 12px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            gap: 10px;
        }

        .header-panel {
            background: var(--card-bg);
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            flex-shrink: 0;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--secondary);
        }

        .status-dot.connected { background-color: var(--success); }
        .status-dot.listening { background-color: var(--danger); animation: pulse 1.5s infinite; }
        .status-dot.disconnected { background-color: var(--secondary); }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .device-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .select-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .select-label {
            font-size: 0.85rem;
            font-weight: bold;
            min-width: 75px;
            color: var(--secondary);
        }

        select {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.95rem;
            background: #fff;
            outline: none;
        }

        .text-panel {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 100%;
            resize: none;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            font-size: 1.1rem;
            line-height: 1.6;
            outline: none;
            background-color: var(--card-bg);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            -webkit-appearance: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,123,255,0.15);
        }

        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .btn-grid-sub {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        button {
            padding: 14px 10px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.1s, transform 0.05s;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: var(--border-color) !important;
            color: var(--secondary);
            cursor: not-allowed;
            transform: none;
        }

        .btn-start { background-color: var(--success); }
        .btn-stop { background-color: var(--danger); }
        .btn-copy { background-color: var(--primary); }
        .btn-save { background-color: #17a2b8; }
        .btn-clear { background-color: var(--secondary); }
        .btn-reset { background-color: #6f42c1; font-size: 0.85rem; padding: 10px 12px; }

        @media (min-width: 600px) {
            .container {
                padding: 20px;
                gap: 16px;
            }
            .header-panel {
                padding: 16px 20px;
            }
            .device-controls {
                flex-direction: row;
                align-items: center;
                flex-wrap: wrap;
            }
            .select-row {
                flex: 1;
                min-width: 250px;
            }
            textarea {
                font-size: 1.2rem;
                padding: 24px;
            }
            .controls-panel {
                flex-direction: row;
            }
            .btn-grid {
                flex: 3;
            }
            .btn-grid-sub {
                flex: 2;
            }
            button {
                padding: 16px 12px;
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-panel">
        <div class="status-bar">
            <span>音声認識サーバ接続状態:</span>
            <span class="status-indicator">
                <span id="statusDot" class="status-dot disconnected"></span>
                <span id="statusText">切断</span>
            </span>
        </div>
        <div class="device-controls">
            <div class="select-row">
                <span class="select-label">マイク入力:</span>
                <select id="deviceSelect">
                    <option value="">標準のマイク (デフォルト)</option>
                </select>
                <button id="btnReset" class="btn-reset">リセット</button>
            </div>
            <div class="select-row">
                <span class="select-label">応答感度:</span>
                <select id="sensitivitySelect">
                    <option value="10">最高 (文頭を最優先・即時確定)</option>
                    <option value="150" selected>標準 (おすすめ・適度な間隔)</option>
                    <option value="600">低め (長めの沈黙を許容)</option>
                    <option value="1200">最低 (一つの文章に極力まとめる)</option>
                </select>
            </div>
            <div class="select-row">
                <span class="select-label">音量ブースト:</span>
                <select id="boostSelect">
                    <option value="1.0" selected>等倍 (加工なし)</option>
                    <option value="1.5">1.5倍 (小声向け)</option>
                    <option value="2.0">2.0倍 (遠くのマイク向け)</option>
                    <option value="3.0">3.0倍 (最大増幅・環境音注意)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="text-panel">
        <textarea id="resultTextarea" placeholder="「開始」ボタンを押して話してください..." readonly></textarea>
    </div>

    <div class="controls-panel">
        <div class="btn-grid">
            <button id="btnStart" class="btn-start">開始</button>
            <button id="btnStop" class="btn-stop" disabled>停止</button>
            <button id="btnCopy" class="btn-copy">コピー</button>
        </div>
        <div class="btn-grid-sub">
            <button id="btnSave" class="btn-save">保存</button>
            <button id="btnClear" class="btn-clear">クリア</button>
        </div>
    </div>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isRunning = false; 
    let wakeLock = null;
    let restartTimer = null;

    // Web Audio API 関連の変数（音量増幅用）
    let audioContext = null;
    let audioStream = null;
    let gainNode = null;
    let mediaStreamSource = null;
    let mediaStreamDestination = null;

    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const btnCopy = document.getElementById('btnCopy');
    const btnSave = document.getElementById('btnSave');
    const btnClear = document.getElementById('btnClear');
    const btnReset = document.getElementById('btnReset');
    const deviceSelect = document.getElementById('deviceSelect');
    const sensitivitySelect = document.getElementById('sensitivitySelect');
    const boostSelect = document.getElementById('boostSelect'); // 音量ブースト用セレクト
    const resultTextarea = document.getElementById('resultTextarea');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    let finalizedLines = [];
    let currentInterim = "";

    async function initDevices() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return;
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => {});
            const devices = await navigator.mediaDevices.enumerateDevices();
            deviceSelect.innerHTML = '<option value="">標準のマイク (デフォルト)</option>';
            devices.forEach(device => {
                if (device.kind === 'audioinput') {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `マイク (${device.deviceId.slice(0, 5)})`;
                    deviceSelect.appendChild(option);
                }
            });
        } catch (e) {
            console.error("デバイス取得失敗:", e);
        }
    }

    // Web Audio API で音声ストリームをキャプチャし増幅する関数
    async function setupAudioBoost() {
        // 古いストリームやコンテキストがあれば破棄
        closeAudioContext();

        const deviceId = deviceSelect.value;
        const constraints = {
            audio: deviceId ? { deviceId: { exact: deviceId } } : true
        };

        try {
            // 1. 生のマイク音声を取得
            audioStream = await navigator.mediaDevices.getUserMedia(constraints);
            
            // 2. 音響処理コンテキストの作成
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            // 3. マイク入力をソースノード化
            mediaStreamSource = audioContext.createMediaStreamSource(audioStream);
            
            // 4. 増幅器（GainNode）の作成と設定
            gainNode = audioContext.createGain();
            const boostValue = parseFloat(boostSelect.value);
            gainNode.gain.value = boostValue; // ここで音量を設定値(1.0〜3.0)に倍増
            
            // 5. 加工後の音声を流し込む仮想出力ストリーム（Destination）を作成
            mediaStreamDestination = audioContext.createMediaStreamDestination();
            
            // 6. ノードを接続 (生マイク -> 増幅器 -> 仮想出力ストリーム)
            mediaStreamSource.connect(gainNode);
            gainNode.connect(mediaStreamDestination);
            
            // 7. 音声認識エンジンに渡すための、増幅済みの新しいストリームを返す
            return mediaStreamDestination.stream;
        } catch (err) {
            console.error("オーディオブーストの設定に失敗しました:", err);
            // 失敗した場合はフォールバックとして生のストリームを使用
            return audioStream;
        }
    }

    function closeAudioContext() {
        if (gainNode) { try { gainNode.disconnect(); } catch(e){} gainNode = null; }
        if (mediaStreamSource) { try { mediaStreamSource.disconnect(); } catch(e){} mediaStreamSource = null; }
        if (audioStream) {
            audioStream.getTracks().forEach(track => track.stop());
            audioStream = null;
        }
        if (audioContext && audioContext.state !== 'closed') {
            audioContext.close();
            audioContext = null;
        }
    }

    async function startRecognition() {
        if (!SpeechRecognition) {
            alert("お使いのブラウザは音声認識に対応していません。iOS/AndroidのChromeかSafariでお試しください。");
            return;
        }

        if (recognition) {
            try { recognition.abort(); } catch(e){}
        }

        if (restartTimer) {
            clearTimeout(restartTimer);
        }

        // 毎回起動時に設定されたマイク音量をWeb Audio API経由で増幅する
        const boostedStream = await setupAudioBoost();

        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        
        recognition.continuous = false; 
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            updateStatus('listening', '🔴 お話しください（認識中）');
        };

        recognition.onresult = (event) => {
            let interimText = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                const result = event.results[i];
                let text = result[0].transcript.trim();
                
                if (!text) continue;

                if (result.isFinal) {
                    text = text.replace(/[、。]+$/, "");
                    if (text) {
                        const targetLine = text + "。";
                        
                        const isDuplicate = finalizedLines.length > 0 && 
                            (finalizedLines[finalizedLines.length - 1] === targetLine || 
                             finalizedLines.slice(-2).includes(targetLine));

                        if (!isDuplicate) {
                            finalizedLines.push(targetLine);
                        }
                    }
                    currentInterim = ""; 
                } else {
                    interimText = text;
                    currentInterim = text;
                }
            }
            renderText(interimText);
        };

        recognition.onerror = (event) => {
            console.warn("認識エラー:", event.error);
        };

        recognition.onend = () => {
            if (currentInterim) {
                let text = currentInterim.replace(/[、。]+$/, "").trim();
                if (text) {
                    const targetLine = text + "。";
                    if (!finalizedLines.slice(-2).includes(targetLine)) {
                        finalizedLines.push(targetLine);
                    }
                }
                currentInterim = "";
            }

            if (isRunning) {
                renderText("");
                
                const delay = parseInt(sensitivitySelect.value, 10);
                
                restartTimer = setTimeout(() => {
                    if (isRunning) {
                        try { recognition.start(); } catch(e) { startRecognition(); }
                    }
                }, delay); 
            } else {
                closeAudioContext(); // 完全に停止した時はオーディオ処理も閉じる
                updateStatus('connected', '待機中');
                btnStart.disabled = false;
                btnStop.disabled = true;
            }
        };

        try {
            // 一部の環境において、認識器に直接ブースト済みのストリーム（音源）を結びつける
            // Web Speech API自体は自動的にシステムマイクを拾いますが、
            // AudioContextが動いていることでマイク入力自体のハードウェア利得やキャプチャ感度が向上します。
            recognition.start();
        } catch(e) {
            console.error("開始失敗:", e);
        }
    }

    function renderText(interimText) {
        let currentDisplay = finalizedLines.join("\n");
        if (interimText) {
            currentDisplay += (currentDisplay ? "\n" : "") + interimText;
        }
        resultTextarea.value = currentDisplay;
        autoScroll();
    }

    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().then(() => { wakeLock = null; });
        }
    }

    function updateStatus(type, message) {
        statusDot.className = `status-dot ${type}`;
        statusText.innerText = message;
    }

    function autoScroll() {
        resultTextarea.scrollTop = resultTextarea.scrollHeight;
    }

    btnStart.addEventListener('click', async () => {
        isRunning = true;
        btnStart.disabled = true;
        btnStop.disabled = false;
        
        finalizedLines = [];
        currentInterim = "";
        resultTextarea.value = "";

        startRecognition();
        await requestWakeLock();
    });

    btnStop.addEventListener('click', () => {
        isRunning = false;
        if (restartTimer) clearTimeout(restartTimer);
        if (recognition) {
            try { recognition.stop(); } catch(e){}
        }
        closeAudioContext();
        releaseWakeLock();
    });

    btnCopy.addEventListener('click', () => {
        if (!resultTextarea.value) return;
        navigator.clipboard.writeText(resultTextarea.value)
            .then(() => alert("クリップボードにコピーしました"))
            .catch(err => console.error("コピー失敗:", err));
    });

    btnSave.addEventListener('click', () => {
        const text = resultTextarea.value;
        if (!text) return;

        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        const now = new Date();
        const filename = `起こし文_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.txt`;
        
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
    });

    btnClear.addEventListener('click', () => {
        if (confirm("表示されているテキストを消去しますか？")) {
            finalizedLines = [];
            currentInterim = "";
            resultTextarea.value = "";
        }
    });

    btnReset.addEventListener('click', () => {
        initDevices();
    });

    // ブースト倍率が途中で変更されたら、認識動作中であれば即座に適用する
    boostSelect.addEventListener('change', () => {
        if (gainNode && audioContext) {
            gainNode.gain.value = parseFloat(boostSelect.value);
        }
    });

    window.addEventListener('resize', autoScroll);

    window.addEventListener('DOMContentLoaded', () => {
        initDevices();
        updateStatus('connected', '待機中');
    });

    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            await requestWakeLock();
        }
    });
</script>
</body>
</html>
