<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逐語録（フル機能・スマホ対応版）</title>
    <style>
        :root {
            --primary: #007bff;
            --danger: #dc3545;
            --success: #28a745;
            --warning: #ffc107;
            --secondary: #6c757d;
            --info: #17a2b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 15px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
            color: #333;
        }
        .status-area {
            font-size: 0.85em;
            text-align: center;
            color: #666;
            margin-bottom: 15px;
            padding: 8px;
            background-color: #e9ecef;
            border-radius: 4px;
            min-height: 20px;
        }
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 70px;
            padding: 10px;
            font-size: 0.9rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            background-color: #ccc !important;
            cursor: not-allowed;
            opacity: 0.6;
        }
        #start { background-color: var(--primary); }
        #stop { background-color: var(--danger); }
        #copy { background-color: var(--info); }
        #save { background-color: var(--success); }
        #clear { background-color: var(--secondary); }

        .settings {
            background-color: #f1f3f5;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .setting-item:last-child {
            margin-bottom: 0;
        }
        .output-box {
            border: 1px solid #ced4da;
            border-radius: 4px;
            padding: 10px;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            background-color: #fff;
            margin-bottom: 15px;
            font-size: 1rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .interim {
            color: #999;
        }
        .device-selector {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ced4da;
            background-color: #fff;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>逐語録</h1>
    
    <div id="statusArea" class="status-area">認識停止中</div>
    
    <div class="controls">
        <button id="start">開始</button>
        <button id="stop" disabled>停止</button>
    </div>

    <div class="settings">
        <div class="setting-item">
            <span>フィラー除去 (えー、あの等)</span>
            <input type="checkbox" id="fillerToggle" checked>
        </div>
        <div class="setting-item">
            <span>改行を多めにする</span>
            <input type="checkbox" id="breakToggle" checked>
        </div>
        <div class="setting-item">
            <span>マイク選択</span>
        </div>
        <select id="audioSource" class="device-selector"></select>
    </div>

    <div class="output-box" id="outputBox">
        <span id="finalSpan"></span>
        <span id="interimSpan" class="interim"></span>
    </div>

    <div class="controls">
        <button id="copy">コピー</button>
        <button id="save">保存</button>
        <button id="clear">クリア</button>
    </div>
</div>

<script>
    // Android（webkit）でも動作するように修正（デザインへの影響はありません）
    const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;

    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const copyBtn = document.getElementById('copy');
    const saveBtn = document.getElementById('save');
    const clearBtn = document.getElementById('clear');
    const statusArea = document.getElementById('statusArea');
    const finalSpan = document.getElementById('finalSpan');
    const interimSpan = document.getElementById('interimSpan');
    const fillerToggle = document.getElementById('fillerToggle');
    const breakToggle = document.getElementById('breakToggle');
    const audioSource = document.getElementById('audioSource');

    let recognition = null;
    let isActive = false;

    if (!SpeechRecognition) {
        updateStatus('error', "音声認識非対応のブラウザです。Chrome等をお使いください。");
        startBtn.disabled = true;
    }

    async function refreshDevices() {
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            audioSource.innerHTML = '';
            devices.forEach(device => {
                if (device.kind === 'audioinput') {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `マイク (${device.deviceId.slice(0,5)})`;
                    audioSource.appendChild(option);
                }
            });
        } catch (e) {
            updateStatus('error', "マイクのアクセス権限がありません。");
        }
    }

    function updateStatus(type, msg) {
        statusArea.innerText = msg;
        if (type === 'active') statusArea.style.backgroundColor = '#d4edda';
        else if (type === 'error') statusArea.style.backgroundColor = '#f8d7da';
        else statusArea.style.backgroundColor = '#e9ecef';
    }

    function initRecognition() {
        if (!SpeechRecognition) return;
        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onstart = () => {
            updateStatus('active', "音声認識中...");
            startBtn.disabled = true;
            stopBtn.disabled = false;
        };

        recognition.onerror = (event) => {
            if (event.error === 'no-speech') return;
            updateStatus('error', "エラー: " + event.error);
        };

        recognition.onend = async () => {
            if (isActive) {
                try {
                    await recognition.start();
                } catch(e) {
                    isActive = false;
                    stopRecognition();
                }
            } else {
                stopRecognition();
            }
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                let transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    let cleanedText = transcript.trim();
                    if (fillerToggle.checked) {
                        const fillerRegex = /^(えーと|えーっと|えー、|あのー|あの|えっと|まー|ま、|うーん|えー|あの)(、|\s)?/gi;
                        cleanedText = cleanedText.replace(fillerRegex, '');
                    }
                    if (cleanedText) {
                        if (breakToggle.checked) {
                            finalSpan.innerText += cleanedText + "\n";
                        } else {
                            finalSpan.innerText += cleanedText + "。";
                        }
                        const obj = document.getElementById('outputBox');
                        obj.scrollTop = obj.scrollHeight;
                    }
                } else {
                    interimTranscript += transcript;
                }
            }
            interimSpan.innerText = interimTranscript;
        };
    }

    function stopRecognition() {
        updateStatus('inactive', "認識停止中");
        startBtn.disabled = false;
        stopBtn.disabled = true;
        interimSpan.innerText = "";
    }

    startBtn.onclick = () => {
        isActive = true;
        if (!recognition) initRecognition();
        try {
            recognition.start();
        } catch(e) {
            updateStatus('error', "既に稼働しています。");
        }
    };

    stopBtn.onclick = () => {
        isActive = false;
        if (recognition) recognition.stop();
    };

    copyBtn.onclick = () => {
        const text = finalSpan.innerText;
        if (!text.trim()) return;
        navigator.clipboard.writeText(text).then(() => {
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "コピー完了！";
            setTimeout(() => copyBtn.innerText = originalText, 2000);
        }).catch(() => {
            alert("手動でコピーしてください。");
        });
    };

    saveBtn.onclick = () => {
        const text = finalSpan.innerText;
        if (!text.trim()) return;
        const now = new Date();
        const timestamp = now.getFullYear() +
            String(now.getMonth() + 1).padStart(2, '0') +
            String(now.getDate()).padStart(2, '0') + "_" +
            String(now.getHours()).padStart(2, '0') +
            String(now.getMinutes()).padStart(2, '0') +
            String(now.getSeconds()).padStart(2, '0');
        
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `逐語録_${timestamp}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    };

    clearBtn.onclick = () => {
        if (confirm("表示されているテキストを消去しますか？")) {
            finalSpan.innerText = "";
            interimSpan.innerText = "";
        }
    };

    window.onload = refreshDevices;
</script>
</body>
</html>
