<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>超安定文字起こしツール (スマホ・追記完全対応版)</title>
    <style>
        :root {
            --bg-color: #f1f3f5;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #ced4da;
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --secondary: #6c757d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body, html {
            height: 100%;
            height: 100dvh;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            gap: 8px;
        }

        .header-panel {
            background: var(--card-bg);
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            flex-shrink: 0;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--secondary);
        }

        .status-dot.connected { background-color: var(--success); }
        .status-dot.listening { background-color: var(--danger); animation: pulse 1.5s infinite; }
        .status-dot.disconnected { background-color: var(--secondary); }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .device-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .select-row {
            display: flex;
            gap: 6px;
            align-items: center;
            width: 100%;
        }

        .select-label {
            font-size: 0.8rem;
            font-weight: bold;
            min-width: 75px;
            color: var(--secondary);
        }

        select {
            flex: 1;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
            background: #fff;
            outline: none;
            height: 32px;
            min-width: 0;
        }

        .text-panel {
            flex: 1;
            min-height: 0; 
        }

        textarea {
            width: 100%;
            height: 100%;
            resize: none;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            font-size: 1.05rem;
            line-height: 1.5;
            outline: none;
            background-color: var(--card-bg);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            -webkit-appearance: none;
        }

        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .btn-grid-sub {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        button {
            padding: 12px 4px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.1s;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 44px;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: var(--border-color) !important;
            color: var(--secondary);
            cursor: not-allowed;
            transform: none;
        }

        .btn-start { background-color: var(--success); }
        .btn-stop { background-color: var(--danger); }
        .btn-copy { background-color: var(--primary); }
        .btn-save { background-color: #17a2b8; }
        .btn-clear { background-color: var(--secondary); }
        .btn-reset { background-color: #6f42c1; font-size: 0.9rem; }

        @media (min-width: 600px) {
            .container {
                padding: 16px;
                gap: 12px;
            }
            .header-panel {
                padding: 12px 16px;
            }
            .device-controls {
                flex-direction: row;
                align-items: center;
                flex-wrap: wrap;
            }
            .select-row {
                flex: 1;
                min-width: 220px;
            }
            select {
                font-size: 0.9rem;
            }
            textarea {
                font-size: 1.15rem;
                padding: 18px;
            }
            .controls-panel {
                flex-direction: row;
            }
            .btn-grid {
                flex: 3;
            }
            .btn-grid-sub {
                flex: 3;
            }
            button {
                font-size: 1rem;
                height: 48px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-panel">
        <div class="status-bar">
            <span>音声認識サーバ接続状態:</span>
            <span class="status-indicator">
                <span id="statusDot" class="status-dot disconnected"></span>
                <span id="statusText">切断</span>
            </span>
        </div>
        <div class="device-controls">
            <div class="select-row">
                <span class="select-label">マイク入力:</span>
                <select id="deviceSelect">
                    <option value="">標準のマイク (デフォルト)</option>
                </select>
            </div>
            <div class="select-row">
                <span class="select-label">応答感度:</span>
                <select id="sensitivitySelect">
                    <option value="400">最高 (即時再起動を試行)</option>
                    <option value="600" selected>標準 (スマホ推奨・高安定)</option>
                    <option value="1000">低め (長めの沈黙を許容)</option>
                    <option value="1500">最低 (一つの文章に極力まとめる)</option>
                </select>
            </div>
            <div class="select-row" style="display: none;">
                <select id="boostSelect"><option value="1.0" selected></option></select>
            </div>
        </div>
    </div>

    <div class="text-panel">
        <textarea id="resultTextarea" placeholder="「開始」ボタンを押して話してください。途中で止めてもテキストは消えずに追記されます..." readonly></textarea>
    </div>

    <div class="controls-panel">
        <div class="btn-grid">
            <button id="btnStart" class="btn-start">開始</button>
            <button id="btnStop" class="btn-stop" disabled>停止</button>
            <button id="btnCopy" class="btn-copy">コピー</button>
        </div>
        <div class="btn-grid-sub">
            <button id="btnSave" class="btn-save">保存</button>
            <button id="btnClear" class="btn-clear">クリア</button>
            <button id="btnReset" class="btn-reset">マイク再診</button>
        </div>
    </div>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isRunning = false; 
    let wakeLock = null;
    let restartTimer = null;

    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const btnCopy = document.getElementById('btnCopy');
    const btnSave = document.getElementById('btnSave');
    const btnClear = document.getElementById('btnClear');
    const btnReset = document.getElementById('btnReset');
    const deviceSelect = document.getElementById('deviceSelect');
    const sensitivitySelect = document.getElementById('sensitivitySelect');
    const resultTextarea = document.getElementById('resultTextarea');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    let finalizedLines = [];
    let currentInterim = "";

    async function initDevices() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            
            deviceSelect.innerHTML = '<option value="">標準のマイク (デフォルト)</option>';
            devices.forEach(device => {
                if (device.kind === 'audioinput') {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `マイク (${device.deviceId.slice(0, 5)})`;
                    deviceSelect.appendChild(option);
                }
            });
            
            stream.getTracks().forEach(track => track.stop());
        } catch (e) {
            console.error("デバイス取得失敗:", e);
        }
    }

    // 音声認識インスタンスとタイマーを安全に完全クリアする関数
    function destroyRecognition() {
        if (restartTimer) {
            clearTimeout(restartTimer);
            restartTimer = null;
        }
        if (recognition) {
            // イベントを無効化して古いインスタンスのコールバック暴走を阻止
            recognition.onstart = null;
            recognition.onresult = null;
            recognition.onerror = null;
            recognition.onend = null;
            try { 
                recognition.abort(); 
            } catch(e){}
            recognition = null;
        }
    }

    function startRecognition() {
        if (!SpeechRecognition) {
            alert("お使いのブラウザは音声認識に対応していません。SafariかChromeの最新版でお試しください。");
            return;
        }

        // 新しく作る前に古いインスタンスを徹底掃除
        destroyRecognition();

        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.continuous = false; 
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            updateStatus('listening', '🔴 お話しください（認識中）');
        };

        recognition.onresult = (event) => {
            let interimText = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                const result = event.results[i];
                let text = result[0].transcript.trim();
                
                if (!text) continue;

                if (result.isFinal) {
                    text = text.replace(/[、。]+$/, "");
                    if (text) {
                        const targetLine = text + "。";
                        const isDuplicate = finalizedLines.length > 0 && 
                            (finalizedLines[finalizedLines.length - 1] === targetLine || 
                             finalizedLines.slice(-2).includes(targetLine));

                        if (!isDuplicate) {
                            finalizedLines.push(targetLine);
                        }
                    }
                    currentInterim = ""; 
                } else {
                    interimText = text;
                    currentInterim = text;
                }
            }
            renderText(interimText);
        };

        recognition.onerror = (event) => {
            console.warn("認識エラー:", event.error);
            if (isRunning && (event.error === 'network' || event.error === 'no-speech' || event.error === 'aborted')) {
                updateStatus('connected', '再接続を試みています...');
            }
        };

        recognition.onend = () => {
            if (currentInterim) {
                let text = currentInterim.replace(/[、。]+$/, "").trim();
                if (text) {
                    const targetLine = text + "。";
                    if (!finalizedLines.slice(-2).includes(targetLine)) {
                        finalizedLines.push(targetLine);
                    }
                }
                currentInterim = "";
            }

            if (isRunning) {
                renderText("");
                const delay = Math.max(400, parseInt(sensitivitySelect.value, 10));
                
                if (restartTimer) clearTimeout(restartTimer);
                restartTimer = setTimeout(() => {
                    if (isRunning) {
                        startRecognition(); // 安全にインスタンスを再生成して起動
                    }
                }, delay); 
            } else {
                updateStatus('connected', '待機中');
                btnStart.disabled = false;
                btnStop.disabled = true;
            }
        };

        try {
            recognition.start();
        } catch(e) {
            console.error("開始失敗:", e);
            if (isRunning) {
                if (restartTimer) clearTimeout(restartTimer);
                restartTimer = setTimeout(() => startRecognition(), 1000);
            }
        }
    }

    function renderText(interimText) {
        let currentDisplay = finalizedLines.join("\n");
        if (interimText) {
            currentDisplay += (currentDisplay ? "\n" : "") + interimText;
        }
        resultTextarea.value = currentDisplay;
        autoScroll();
    }

    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().then(() => { wakeLock = null; });
        }
    }

    function updateStatus(type, message) {
        statusDot.className = `status-dot ${type}`;
        statusText.innerText = message;
    }

    function autoScroll() {
        resultTextarea.scrollTop = resultTextarea.scrollHeight;
    }

    btnStart.addEventListener('click', async () => {
        isRunning = true;
        btnStart.disabled = true;
        btnStop.disabled = false;
        currentInterim = "";

        startRecognition();
        await requestWakeLock();
    });

    btnStop.addEventListener('click', () => {
        isRunning = false;
        destroyRecognition(); // 停止時にもクリーンアップを徹底
        releaseWakeLock();
        updateStatus('connected', '待機中');
        btnStart.disabled = false;
        btnStop.disabled = true;
    });

    btnCopy.addEventListener('click', () => {
        if (!resultTextarea.value) return;
        navigator.clipboard.writeText(resultTextarea.value)
            .then(() => alert("クリップボードにコピーしました"))
            .catch(err => console.error("コピー失敗:", err));
    });

    btnSave.addEventListener('click', () => {
        const text = resultTextarea.value;
        if (!text) return;

        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        const now = new Date();
        const filename = `起こし文_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.txt`;
        
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
    });

    btnClear.addEventListener('click', () => {
        if (confirm("表示されているテキストを消去しますか？")) {
            finalizedLines = [];
            currentInterim = "";
            resultTextarea.value = "";
        }
    });

    btnReset.addEventListener('click', () => {
        initDevices();
    });

    window.addEventListener('resize', autoScroll);

    window.addEventListener('DOMContentLoaded', () => {
        initDevices();
        updateStatus('connected', '待機中');
    });

    document.addEventListener('visibilitychange', async () => {
        if (isRunning && document.visibilityState === 'visible') {
            startRecognition(); // タブ復帰時も安全な再起動を適用
            await requestWakeLock();
        }
    });
</script>
</body>
</html>
