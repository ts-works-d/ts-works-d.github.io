<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>超安定文字起こしツール (モバイル・タブレット完全対応)</title>
    <style>
        :root {
            --bg-color: #f1f3f5;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #ced4da;
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --secondary: #6c757d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body, html {
            height: 100%;
            height: 100dvh;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 12px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            gap: 10px;
        }

        .header-panel {
            background: var(--card-bg);
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            flex-shrink: 0;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--secondary);
        }

        .status-dot.connected { background-color: var(--success); }
        .status-dot.listening { background-color: var(--danger); animation: pulse 1.5s infinite; }
        .status-dot.disconnected { background-color: var(--secondary); }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .device-controls {
            display: flex;
            gap: 8px;
        }

        select {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.95rem;
            background: #fff;
            outline: none;
        }

        .text-panel {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 100%;
            resize: none;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            font-size: 1.1rem;
            line-height: 1.6;
            outline: none;
            background-color: var(--card-bg);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            -webkit-appearance: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,123,255,0.15);
        }

        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .btn-grid-sub {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        button {
            padding: 14px 10px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.1s, transform 0.05s;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: var(--border-color) !important;
            color: var(--secondary);
            cursor: not-allowed;
            transform: none;
        }

        .btn-start { background-color: var(--success); }
        .btn-stop { background-color: var(--danger); }
        .btn-copy { background-color: var(--primary); }
        .btn-save { background-color: #17a2b8; }
        .btn-clear { background-color: var(--secondary); }
        .btn-reset { background-color: #6f42c1; font-size: 0.85rem; padding: 10px 12px; }

        @media (min-width: 600px) {
            .container {
                padding: 20px;
                gap: 16px;
            }
            .header-panel {
                padding: 16px 20px;
            }
            textarea {
                font-size: 1.2rem;
                padding: 24px;
            }
            .controls-panel {
                flex-direction: row;
            }
            .btn-grid {
                flex: 3;
            }
            .btn-grid-sub {
                flex: 2;
            }
            button {
                padding: 16px 12px;
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-panel">
        <div class="status-bar">
            <span>音声認識サーバ接続状態:</span>
            <span class="status-indicator">
                <span id="statusDot" class="status-dot disconnected"></span>
                <span id="statusText">切断</span>
            </span>
        </div>
        <div class="device-controls">
            <select id="deviceSelect">
                <option value="">標準のマイク (デフォルト)</option>
            </select>
            <button id="btnReset" class="btn-reset">デバイスリセット</button>
        </div>
    </div>

    <div class="text-panel">
        <textarea id="resultTextarea" placeholder="「開始」ボタンを押して話してください..." readonly></textarea>
    </div>

    <div class="controls-panel">
        <div class="btn-grid">
            <button id="btnStart" class="btn-start">開始</button>
            <button id="btnStop" class="btn-stop" disabled>停止</button>
            <button id="btnCopy" class="btn-copy">コピー</button>
        </div>
        <div class="btn-grid-sub">
            <button id="btnSave" class="btn-save">保存</button>
            <button id="btnClear" class="btn-clear">クリア</button>
        </div>
    </div>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isRunning = false; 
    let wakeLock = null;

    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const btnCopy = document.getElementById('btnCopy');
    const btnSave = document.getElementById('btnSave');
    const btnClear = document.getElementById('btnClear');
    const btnReset = document.getElementById('btnReset');
    const deviceSelect = document.getElementById('deviceSelect');
    const resultTextarea = document.getElementById('resultTextarea');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    let finalizedLines = [];
    let currentInterim = "";

    async function initDevices() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return;
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => {});
            const devices = await navigator.mediaDevices.enumerateDevices();
            deviceSelect.innerHTML = '<option value="">標準のマイク (デフォルト)</option>';
            devices.forEach(device => {
                if (device.kind === 'audioinput') {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `マイク (${device.deviceId.slice(0, 5)})`;
                    deviceSelect.appendChild(option);
                }
            });
        } catch (e) {
            console.error("デバイス取得失敗:", e);
        }
    }

    function startRecognition() {
        if (!SpeechRecognition) {
            alert("お使いのブラウザは音声認識に対応していません。iOS/AndroidのChromeかSafariでお試しください。");
            return;
        }

        if (recognition) {
            try { recognition.abort(); } catch(e){}
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        
        // 【連続認識モード】一文ごとに認識を切断せず、接続を維持する
        recognition.continuous = true; 
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            updateStatus('listening', '接続中 (認識中)');
        };

        recognition.onresult = (event) => {
            let interimText = "";
            
            // continuous=true時は全履歴が流れてくるため、毎回配列をリセットして再パース
            finalizedLines = []; 

            for (let i = 0; i < event.results.length; ++i) {
                const result = event.results[i];
                let text = result[0].transcript.trim();
                
                if (!text) continue;

                if (result.isFinal) {
                    text = text.replace(/[、。]+$/, "");
                    if (text) {
                        finalizedLines.push(text + "。");
                    }
                    currentInterim = ""; 
                } else {
                    interimText = text;
                    currentInterim = text;
                }
            }
            renderText(interimText);
        };

        recognition.onerror = (event) => {
            console.warn("認識エラー:", event.error);
        };

        // ブラウザ都合や無音検知でセッションが終了した場合のみ、ラグなし(0ms)で再起動
        recognition.onend = () => {
            if (isRunning) {
                if (currentInterim) {
                    let text = currentInterim.replace(/[、。]+$/, "").trim();
                    if (text) {
                        finalizedLines.push(text + "。");
                    }
                    currentInterim = "";
                }
                renderText("");
                
                try { recognition.start(); } catch(e) { startRecognition(); }
            } else {
                updateStatus('connected', '待機中');
                btnStart.disabled = false;
                btnStop.disabled = true;
            }
        };

        try {
            recognition.start();
        } catch(e) {
            console.error("開始失敗リトライ:", e);
        }
    }

    function renderText(interimText) {
        let currentDisplay = finalizedLines.join("\n");
        if (interimText) {
            currentDisplay += (currentDisplay ? "\n" : "") + interimText;
        }
        resultTextarea.value = currentDisplay;
        autoScroll();
    }

    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().then(() => { wakeLock = null; });
        }
    }

    function updateStatus(type, message) {
        statusDot.className = `status-dot ${type}`;
        statusText.innerText = message;
    }

    function autoScroll() {
        resultTextarea.scrollTop = resultTextarea.scrollHeight;
    }

    btnStart.addEventListener('click', async () => {
        isRunning = true;
        btnStart.disabled = true;
        btnStop.disabled = false;
        startRecognition();
        await requestWakeLock();
    });

    btnStop.addEventListener('click', () => {
        isRunning = false;
        if (recognition) {
            try { recognition.stop(); } catch(e){}
        }
        releaseWakeLock();
    });

    btnCopy.addEventListener('click', () => {
        if (!resultTextarea.value) return;
        navigator.clipboard.writeText(resultTextarea.value)
            .then(() => alert("クリップボードにコピーしました"))
            .catch(err => console.error("コピー失敗:", err));
    });

    btnSave.addEventListener('click', () => {
        const text = resultTextarea.value;
        if (!text) return;

        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        const now = new Date();
        const filename = `起こし文_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.txt`;
        
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
    });

    btnClear.addEventListener('click', () => {
        if (confirm("表示されているテキストを消去しますか？")) {
            finalizedLines = [];
            currentInterim = "";
            resultTextarea.value = "";
        }
    });

    btnReset.addEventListener('click', () => {
        initDevices();
    });

    window.addEventListener('resize', autoScroll);

    window.addEventListener('DOMContentLoaded', () => {
        initDevices();
        updateStatus('connected', '待機中');
    });

    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            await requestWakeLock();
        }
    });
</script>
</body>
</html>
