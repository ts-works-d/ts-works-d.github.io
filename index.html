<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>逐語録（高性能・スマホ最適化版）</title>
    <style>
        :root { 
            --primary: #007bff; --danger: #dc3545; --success: #28a745; 
            --secondary: #6c757d; --info: #17a2b8; --dark: #343a40;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 10px; background: #f4f7f9; color: #333; 
            width: 100vw; height: 100vh; display: flex; flex-direction: column;
        }
        .container { 
            display: flex; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; width: 100%;
        }
        .card { 
            background: #fff; padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; flex: 1; min-height: 0;
        }
        h2 { font-size: 1.1em; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-bottom: 10px; }
        
        .status-area { 
            font-size: 0.85em; text-align: center; margin-bottom: 10px; padding: 8px; 
            background: #fff3cd; border-radius: 6px; color: #856404; font-weight: bold; 
        }
        
        /* 設定エリアのレイアウト */
        .config-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; background: #f8f9fa; padding: 10px; border-radius: 8px;
        }
        .config-item { display: flex; flex-direction: column; gap: 4px; font-size: 0.8em; font-weight: bold; color: #555; }
        .config-item.full-width { grid-column: span 2; }
        select { padding: 6px; border-radius: 6px; border: 1px solid #ccc; font-size: 0.9em; background: #fff; width: 100%; }
        
        /* コントロールボタン */
        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
        button { padding: 12px 4px; font-size: 0.85em; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; color: white; transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
        #start { background: var(--primary); }
        #stop { background: var(--danger); }
        #copy { background: var(--info); }
        #clear { background: var(--secondary); }
        #reset-dev { background: var(--dark); grid-column: span 4; padding: 8px; font-size: 0.8em; }
        button:disabled { background: #ccc !important; opacity: 0.5; cursor: not-allowed; }
        
        /* 出力ボックス（自動伸縮・スクロール） */
        #output-box { 
            flex: 1; width: 100%; padding: 12px; border-radius: 8px; 
            border: 1px solid #ddd; background: #fafafa; overflow-y: auto; 
            line-height: 1.6; font-size: 15px; min-height: 0; word-break: break-all;
        }
        #final-span { color: #111; white-space: pre-wrap; }
        #interim-span { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>逐語録システム</h2>
        <div class="status-area" id="status-display">「認識開始」を押してください</div>
        
        <div class="config-grid">
            <div class="config-item full-width">
                <label for="device-select">入力デバイス選択</label>
                <select id="device-select"><option value="">既定のマイク</option></select>
            </div>
            <div class="config-item">
                <label for="sensitivity-select">感度調整 (1-20)</label>
                <select id="sensitivity-select">
                    </select>
            </div>
            <div class="config-item">
                <label for="boost-select">ブースト (1-20)</label>
                <select id="boost-select">
                    </select>
            </div>
        </div>

        <div class="controls">
            <button id="start">開始</button>
            <button id="stop" disabled>停止</button>
            <button id="copy">コピー</button>
            <button id="clear">クリア</button>
            <button id="reset-dev">デバイスリセット</button>
        </div>

        <div id="output-box">
            <span id="final-span"></span><span id="interim-span"></span>
        </div>
    </div>
</div>

<script>
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const copyBtn = document.getElementById('copy');
    const clearBtn = document.getElementById('clear');
    const resetDevBtn = document.getElementById('reset-dev');
    const finalSpan = document.getElementById('final-span');
    const interimSpan = document.getElementById('interim-span');
    const outputBox = document.getElementById('output-box');
    const statusDisp = document.getElementById('status-display');
    const deviceSelect = document.getElementById('device-select');
    const sensitivitySelect = document.getElementById('sensitivity-select');
    const boostSelect = document.getElementById('boost-select');

    let recognition = null;
    let isActive = false;
    let restartTimeoutId = null;
    let wakeLock = null; // スリープ防止用
    
    // Web Audio API 関連
    let audioContext = null;
    let mediaStream = null;
    let mediaStreamSource = null;
    let gainNode = null;
    let audioProcessor = null;

    // セレクトボックスの初期化 (1〜20、初期値5)
    for(let i=1; i<=20; i++){
        const optS = document.createElement('option'); optS.value = i; optS.innerText = i; if(i===5) optS.selected = true;
        sensitivitySelect.appendChild(optS);
        const optB = document.createElement('option'); optB.value = i; optB.innerText = i; if(i===5) optB.selected = true;
        boostSelect.appendChild(optB);
    }

    function updateStatus(state, msg) {
        statusDisp.innerText = msg;
        if (state === 'online') {
            statusDisp.style.background = "#d4edda"; statusDisp.style.color = "#155724";
        } else if (state === 'offline') {
            statusDisp.style.background = "#e2e3e5"; statusDisp.style.color = "#383d41";
        } else {
            statusDisp.style.background = "#fff3cd"; statusDisp.style.color = "#856404";
        }
    }

    // デバイス一覧の取得
    async function initDevices() {
        try {
            // 最初の一回マイクパーミッションを要求
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => null);
            if (stream) stream.getTracks().forEach(track => track.stop());

            const devices = await navigator.mediaDevices.enumerateDevices();
            deviceSelect.innerHTML = '<option value="">既定のマイク</option>';
            devices.forEach(device => {
                if (device.kind === 'audioinput') {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.innerText = device.label || `マイク (${device.deviceId.slice(0,5)})`;
                    deviceSelect.appendChild(option);
                }
            });
        } catch (e) {
            console.error("デバイス取得失敗:", e);
        }
    }

    // スリープ防止（Wake Lock API）の有効化
    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
    }

    function releaseWakeLock() {
        if (wakeLock) { wakeLock.release().then(() => wakeLock = null); }
    }

    // 音声処理（感度とブーストの適用）
    async function setupAudioProcessing() {
        if (audioContext) { try { await audioContext.close(); } catch(e){} }
        
        const constraints = { audio: true };
        if (deviceSelect.value) {
            constraints.audio = { deviceId: { exact: deviceSelect.value } };
        }

        try {
            mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
            
            // iOS/Androidでの挙動維持のため、AudioContextはユーザーアクション直後に生成
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            mediaStreamSource = audioContext.createMediaStreamSource(mediaStream);
            gainNode = audioContext.createGain();

            // ブースト値(1〜20)をGainに反映（初期値5を基準に倍率計算）
            const boostVal = parseFloat(boostSelect.value);
            gainNode.gain.value = boostVal / 5.0; 

            // 感度調整(1〜20)をノイズゲートの閾値として見立てて簡易フィルター(今回はゲイン制御と連動)
            const sensVal = parseFloat(sensitivitySelect.value);
            // 感度が高い(値が大きい)ほど、小さな音も拾うようにゲインを微調整
            gainNode.gain.value *= (sensVal / 5.0);

            mediaStreamSource.connect(gainNode);
            // 認識精度低下を防ぐため、スピーカー(destination)には繋がずハウリングを防止
            
        } catch (err) {
            console.error("Audioコンテキスト設定エラー:", err);
        }
    }

    function initRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            updateStatus('offline', "ブラウザが音声認識に対応していません");
            return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = true;

        recognition.onstart = () => {
            updateStatus('online', "接続中：お話しください");
            requestWakeLock();
        };

        let lastTranscript = ""; // 多重表示・重複防止用

        recognition.onresult = (e) => {
            let interimText = '';
            for (let i = e.resultIndex; i < e.results.length; i++) {
                let transcript = e.results[i][0].transcript;
                
                if (e.results[i].isFinal) {
                    let cleanedText = transcript.trim();
                    
                    // フィラー（えー、あの）の徹底除去
                    const fillerRegex = /^(えーと|えーっと|えー、|あのー|あの、|えー|あの|まー|うーん|えっと)/g;
                    cleanedText = cleanedText.replace(fillerRegex, "").replace(/[、\s](えーと|えーっと|えー、|あのー|あの、|えー|あの|えっと)[、\s]?/g, " ").trim();
                    
                    if (cleanedText === "" || cleanedText === lastTranscript) continue;
                    lastTranscript = cleanedText;

                    const currentFinal = finalSpan.innerText.trim();
                    let separator = "";
                    
                    // 「、」「。」「改行」の重複を防ぎ、適宜挿入するロジック
                    if (currentFinal !== "") {
                        if (/[。？！?!]$/.test(currentFinal)) {
                            separator = "\n"; 
                        } else if (/[、]$/.test(currentFinal)) {
                            separator = " ";
                        } else {
                            separator = "。\n";
                        }
                    }
                    
                    if (!/[。？！?!、]$/.test(cleanedText)) {
                        cleanedText += "。";
                    }

                    finalSpan.innerText += separator + cleanedText;
                } else {
                    interimText += transcript;
                }
            }
            interimSpan.innerText = interimText;
            
            // 画面最下部への自動スクロール（文字落ち確認のストレスを軽減）
            outputBox.scrollTop = outputBox.scrollHeight;
        };

        // 切断からの自動復旧（最重要項目）
        recognition.onend = () => {
            if (isActive) {
                clearTimeout(restartTimeoutId);
                restartTimeoutId = setTimeout(() => {
                    if (isActive && recognition) {
                        try { 
                            recognition.start(); 
                        } catch(e) {
                            // 連続して失敗した場合は再生成を試みる
                            initRecognition();
                            try{ recognition.start(); }catch(err){}
                        }
                    }
                }, 300);
            }
        };

        recognition.onerror = (ev) => {
            // no-speech 等のエラーでもクラッシュさせず、onend経由で自動復帰させる
            if (ev.error === 'no-speech' || ev.error === 'audio-capture' || ev.error === 'network') {
                console.log(`認識中断(${ev.error})：自動復旧します`);
            } else {
                console.warn("認識エラー:", ev.error);
            }
        };
    }

    // 開始ボタン
    startBtn.onclick = async () => {
        isActive = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        deviceSelect.disabled = true;
        updateStatus('', "起動中...");

        // オーディオパイプラインの構築
        await setupAudioProcessing();

        if (!recognition) {
            initRecognition();
        }

        if (recognition) {
            try {
                recognition.start();
            } catch (e) {
                // すでに動いている場合の二重起動エラー回避
                try { recognition.stop(); } catch(ex){}
                setTimeout(() => { if(isActive) recognition.start(); }, 400);
            }
        }
    };

    // 停止ボタン
    stopBtn.onclick = () => {
        isActive = false;
        clearTimeout(restartTimeoutId);
        startBtn.disabled = false;
        stopBtn.disabled = true;
        deviceSelect.disabled = false;
        
        if (recognition) {
            try { recognition.stop(); } catch(e){}
        }
        
        // オーディオトラックの解放
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
        }
        if (audioContext) {
            try { audioContext.close(); } catch(e){}
        }
        
        releaseWakeLock();
        updateStatus('offline', "停止しました");
    };

    // コピーボタン
    copyBtn.onclick = async () => {
        const text = finalSpan.innerText;
        if (!text.trim()) return;
        try {
            await navigator.clipboard.writeText(text);
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "完了！";
            setTimeout(() => copyBtn.innerText = originalText, 1500);
        } catch (err) {
            alert("長押しして手動コピーしてください：\n\n" + text);
        }
    };

    // クリアボタン
    clearBtn.onclick = () => {
        if (confirm("表示されているテキストを消去しますか？")) {
            finalSpan.innerText = "";
            interimSpan.innerText = "";
        }
    };

    // デバイスリセットボタン
    resetDevBtn.onclick = async () => {
        const activeState = isActive;
        if (activeState) {
            stopBtn.click();
        }
        updateStatus('', "デバイス再スキャン中...");
        await initDevices();
        if (activeState) {
            setTimeout(() => { startBtn.click(); }, 500);
        } else {
            updateStatus('offline', "リセット完了");
        }
    };

    // 感度やブーストが途中で変更されたらリアルタイムに再反映
    const updateAudioParams = () => {
        if(isActive && gainNode && boostSelect && sensitivitySelect) {
            const boostVal = parseFloat(boostSelect.value);
            const sensVal = parseFloat(sensitivitySelect.value);
            gainNode.gain.value = (boostVal / 5.0) * (sensVal / 5.0);
        }
    };
    sensitivitySelect.onchange = updateAudioParams;
    boostSelect.onchange = updateAudioParams;

    // 初回読み込み時のデバイス一覧取得
    window.onload = () => {
        initDevices();
    };
</script>

</body>
</html>
