<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高精度・逐語録（Chrome特化版）</title>
    <style>
        :root { 
            --primary: #007bff; --danger: #dc3545; --success: #28a745; 
            --secondary: #6c757d; --info: #17a2b8; --dark: #343a40;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            padding: 10px; background: #f8f9fa; color: #333; margin: 0;
            display: flex; flex-direction: column; height: 100vh;
        }
        .container { 
            width: 100%; max-width: 800px; margin: auto; 
            display: flex; flex-direction: column; height: 100%; padding: 5px;
        }
        .card { 
            background: #fff; padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            display: flex; flex-direction: column; flex-grow: 1; min-height: 0;
        }
        h2 { margin: 0 0 10px; font-size: 1.1em; text-align: center; color: var(--dark); }
        
        /* ステータス表示 */
        .status-container { display: flex; gap: 8px; margin-bottom: 10px; }
        .status-area { flex: 2; font-size: 0.85em; text-align: center; padding: 8px; background: #fff3cd; border-radius: 6px; color: #856404; font-weight: bold; }
        .server-status { flex: 1; font-size: 0.85em; text-align: center; padding: 8px; background: #e2e3e5; border-radius: 6px; color: #383d41; font-weight: bold; }
        
        /* 設定エリア（グリッドレイアウトでコンパクトに） */
        .config-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 8px; margin-bottom: 12px; background: #f1f3f5; padding: 10px; border-radius: 8px;
        }
        .config-item { display: flex; flex-direction: column; gap: 4px; font-size: 0.75em; font-weight: bold; color: #495057; }
        .config-item select { padding: 6px; border-radius: 4px; border: 1px solid #ced4da; font-size: 13px; background: #fff; }
        .config-item select:disabled { background: #e9ecef; }
        
        /* コントロールボタン */
        .controls { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        button { flex: 1; min-width: 70px; padding: 10px 5px; font-size: 13px; font-weight: bold; cursor: pointer; border: none; border-radius: 6px; color: white; transition: background 0.1s; }
        #start { background: var(--primary); }
        #stop { background: var(--danger); }
        #copy { background: var(--info); }
        #clear { background: var(--secondary); }
        #reset-dev { background: var(--dark); }
        button:disabled { background: #dee2e6 !important; color: #6c757d !important; cursor: not-allowed; }
        
        /* 出力ボックス（画面サイズに合わせて伸縮） */
        #output-box { 
            flex-grow: 1; min-height: 150px; padding: 15px; border-radius: 8px; 
            border: 1px solid #dee2e6; background: #fafafa; overflow-y: auto; 
            line-height: 1.7; font-size: 16px; word-break: break-all;
        }
        #final-span { color: #111; white-space: pre-wrap; }
        #interim-span { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>高精度逐語録（音声認識）</h2>
        
        <div class="status-container">
            <div class="status-area" id="status-display">「認識開始」を押してください</div>
            <div class="server-status" id="server-display">サーバ: 切断</div>
        </div>
        
        <div class="config-grid">
            <div class="config-item" style="grid-column: span 2;">
                <label for="device-select">入力デバイス選択</label>
                <select id="device-select"><option value="">既定のマイク</option></select>
            </div>
            <div class="config-item">
                <label for="sensitivity-select">感度調整 (1-100)</label>
                <select id="sensitivity-select"></select>
            </div>
            <div class="config-item">
                <label for="boost-select">ブースト (1-20)</label>
                <select id="boost-select"></select>
            </div>
            <div class="config-item">
                <label for="level-select">感度レベル (1-20)</label>
                <select id="level-select"></select>
            </div>
        </div>
        
        <div class="controls">
            <button id="start">開始</button>
            <button id="stop" disabled>停止</button>
            <button id="copy">コピー</button>
            <button id="clear">クリア</button>
            <button id="reset-dev">デバイスリセット</button>
        </div>

        <div id="output-box">
            <span id="final-span"></span><span id="interim-span"></span>
        </div>
    </div>
</div>

<script>
    // DOM要素の取得
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const copyBtn = document.getElementById('copy');
    const clearBtn = document.getElementById('clear');
    const resetDevBtn = document.getElementById('reset-dev');
    const finalSpan = document.getElementById('final-span');
    const interimSpan = document.getElementById('interim-span');
    const outputBox = document.getElementById('output-box');
    const statusDisp = document.getElementById('status-display');
    const serverDisp = document.getElementById('server-display');
    const deviceSelect = document.getElementById('device-select');
    const sensitivitySelect = document.getElementById('sensitivity-select');
    const boostSelect = document.getElementById('boost-select');
    const levelSelect = document.getElementById('level-select');

    let recognition = null;
    let isActive = false;
    let restartTimeoutId = null;
    
    // Web Audio API 関連（感度・ブースト制御用）
    let audioContext = null;
    let mediaStream = null;
    let gainNode = null;
    let scriptProcessor = null;

    // リストボックスの初期オプション生成
    function initSelectOptions() {
        // 感度調整 (1～100) デフォルト: 50
        for (let i = 1; i <= 100; i++) {
            let opt = new Option(i, i);
            if (i === 50) opt.selected = true;
            sensitivitySelect.add(opt);
        }
        // ブースト (1～20) デフォルト: 1
        for (let i = 1; i <= 20; i++) {
            let opt = new Option(i, i);
            if (i === 1) opt.selected = true;
            boostSelect.add(opt);
        }
        // 感度レベル (1～20) デフォルト: 10
        for (let i = 1; i <= 20; i++) {
            let opt = new Option(i, i);
            if (i === 10) opt.selected = true;
            levelSelect.add(opt);
        }
    }

    // デバイス一覧を取得
    async function enumerateDevices() {
        try {
            // 先にマイクパーミッションを要求してデバイス名を取得可能にする
            await navigator.mediaDevices.getUserMedia({ audio: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            
            // セレクトボックスをクリア
            deviceSelect.innerHTML = '<option value="">既定のマイク</option>';
            
            devices.forEach(device => {
                if (device.kind === 'audioinput') {
                    const opt = new Option(device.label || `マイク (${device.deviceId.slice(0,5)})`, device.deviceId);
                    deviceSelect.add(opt);
                }
            });
        } catch (err) {
            console.error("デバイス一覧の取得に失敗:", err);
            updateStatus('offline', "マイクへのアクセスを許可してください");
        }
    }

    // UIステータス更新
    function updateStatus(state, msg) {
        statusDisp.innerText = msg;
        if (state === 'online') {
            statusDisp.style.background = "#d4edda"; statusDisp.style.color = "#155724";
            serverDisp.innerText = "サーバ: 接続";
            serverDisp.style.background = "#d4edda"; serverDisp.style.color = "#155724";
        } else if (state === 'offline') {
            statusDisp.style.background = "#e2e3e5"; statusDisp.style.color = "#383d41";
            serverDisp.innerText = "サーバ: 切断";
            serverDisp.style.background = "#e2e3e5"; serverDisp.style.color = "#383d41";
        } else {
            statusDisp.style.background = "#fff3cd"; statusDisp.style.color = "#856404";
        }
    }

    // オーディオパイプラインの構築（感度・ブースト・しきい値判定を適用）
    async function setupAudioPipeline() {
        if (audioContext) {
            try { await audioContext.close(); } catch(e){}
        }

        const deviceId = deviceSelect.value;
        const constraints = {
            audio: deviceId ? { deviceId: { exact: deviceId } } : true
        };

        mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        const source = audioContext.createMediaStreamSource(mediaStream);
        gainNode = audioContext.createGain();
        
        // 1. ブースト調整と感度調整の掛け合わせでゲインを設定
        // ブースト値(1~20) × (感度1~100 / 50) をベースに乗算
        const boostVal = parseFloat(boostSelect.value);
        const sensitivityVal = parseFloat(sensitivitySelect.value) / 50.0;
        gainNode.gain.value = boostVal * sensitivityVal;

        // 2. 感度レベルによる無音ゲート処理 (ScriptProcessor)
        // 内部的に、設定された「感度レベル(1-20)」を下回る音をカットする
        scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
        const threshold = (21 - parseInt(levelSelect.value)) * 0.001; // 値が大きいほど低ノイズでも通す（ゲートが開く）

        scriptProcessor.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            const output = e.outputBuffer.getChannelData(0);
            
            // 音量の絶対値の最大を計算
            let maxVal = 0;
            for (let i = 0; i < input.length; i++) {
                let abs = Math.abs(input[i]);
                if (abs > maxVal) maxVal = abs;
            }

            // 閾値チェック：感度レベル以下の極小音量は無音(0)化して認識エラーや誤認識を防ぐ
            const pass = maxVal >= threshold;
            for (let i = 0; i < input.length; i++) {
                output[i] = pass ? input[i] : 0;
            }
        };

        source.connect(gainNode);
        gainNode.connect(scriptProcessor);
        // 音声認識エンジンに送るため、最終的に必要なら宛先に接続（Chromeの仕様に最適化）
        scriptProcessor.connect(audioContext.destination);
    }

    // 音声認識の初期化
    function initRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            updateStatus('offline', "ブラウザが音声認識に対応していません");
            return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        // リアルタイムにレスポンスを返すためにtrue
        recognition.interimResults = true; 
        // 途切れても終了させないためにtrue
        recognition.continuous = true; 

        recognition.onstart = () => {
            updateStatus('online', "認識中：お話しください");
        };

        recognition.onresult = (e) => {
            let interimText = '';
            for (let i = e.resultIndex; i < e.results.length; i++) {
                let transcript = e.results[i][0].transcript;
                if (e.results[i].isFinal) {
                    let cleanedText = transcript.trim();
                    
                    // フィラー（えー、あの等）の除去（重複・多重化対策）
                    const fillerRegex = /^(えーと|えーっと|えー、|あのー|あの、|えー|あの|まー|うーん)/g;
                    cleanedText = cleanedText.replace(fillerRegex, "").replace(/[、\s](えーと|えーっと|えー、|あのー|あの、|えー|あの)[、\s]?/g, " ").trim();
                    
                    if (cleanedText === "") continue;

                    // 既存の確定文字列を取得
                    let currentFinal = finalSpan.innerText;
                    
                    // 文末の処理：「、」「。」「改行」が重複しないようにする
                    let separator = "";
                    if (currentFinal !== "") {
                        // 既に改行や句点がある場合は重複させない
                        if (/[。\n]$/.test(currentFinal)) {
                            separator = "";
                        } else if (/[、]$/.test(currentFinal)) {
                            separator = "\n";
                        } else {
                            separator = "。\n";
                        }
                    }
                    
                    // 今回の確定文字の末尾に句点をつけるか判定
                    if (!/[。？！?!、]$/.test(cleanedText)) {
                        cleanedText += "。";
                    }

                    // 予測変換や多重表示を防ぐため、単純結合ではなく重複を確認
                    if (!currentFinal.endsWith(cleanedText)) {
                        finalSpan.innerText = currentFinal + separator + cleanedText;
                    }
                } else {
                    interimText += transcript;
                }
            }
            interimSpan.innerText = interimText;
            // 自動最下部スクロール
            outputBox.scrollTop = outputBox.scrollHeight;
        };

        // 重要：切断からの自動復旧ロジック（文字落ち・クラッシュ防止）
        recognition.onend = () => {
            serverDisp.innerText = "サーバ: 切断";
            serverDisp.style.background = "#e2e3e5"; serverDisp.style.color = "#383d41";

            if (isActive) {
                clearTimeout(restartTimeoutId);
                // 瞬時再起動をかけることで文字落ち時間を極限まで減らす
                restartTimeoutId = setTimeout(() => {
                    if (isActive && recognition) {
                        try { 
                            recognition.start(); 
                        } catch(e) {
                            console.warn("再起動試行中...", e);
                        }
                    }
                }, 100);
            }
        };

        // エラーハンドリング
        recognition.onerror = (ev) => {
            console.warn("認識エラー発生:", ev.error);
            // 'no-speech' (無音) や 'audio-capture' などのエラーでも停止させず、onend経由で自動復旧させる
            if (ev.error === 'no-speech' || ev.error === 'audio-capture' || ev.error === 'network') {
                try { recognition.stop(); } catch(e){}
            }
        };
    }

    // 「開始」ボタン
    startBtn.onclick = async () => {
        isActive = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        deviceSelect.disabled = true;
        updateStatus('', "起動中...");

        try {
            // Web Audio APIによるゲイン・感度コントロール設定
            await setupAudioPipeline();
        } catch (err) {
            console.error("オーディオパイプライン設定失敗:", err);
        }

        if (!recognition) {
            initRecognition();
        }

        if (recognition) {
            try {
                recognition.start();
            } catch (e) {
                console.error(e);
                updateStatus('offline', "起動に失敗しました。再読込してください。");
            }
        }
    };

    // 「停止」ボタン
    stopBtn.onclick = () => {
        isActive = false;
        clearTimeout(restartTimeoutId);
        startBtn.disabled = false;
        stopBtn.disabled = true;
        deviceSelect.disabled = false;
        
        if (recognition) {
            try { recognition.stop(); } catch(e){}
        }
        
        // オーディオストリームの解放
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
        }
        if (audioContext) {
            try { audioContext.close(); } catch(e){}
        }
        
        updateStatus('offline', "停止しました");
    };

    // 「コピー」ボタン
    copyBtn.onclick = async () => {
        const text = finalSpan.innerText;
        if (!text.trim()) return;
        try {
            await navigator.clipboard.writeText(text);
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "コピー完了！";
            setTimeout(() => copyBtn.innerText = originalText, 1500);
        } catch (err) {
            alert("長押しして手動コピーしてください：\n\n" + text);
        }
    };

    // 「クリア」ボタン
    clearBtn.onclick = () => {
        if (confirm("表示されているテキストを消去しますか？")) {
            finalSpan.innerText = "";
            interimSpan.innerText = "";
        }
    };

    // 「デバイスリセット」ボタン
    resetDevBtn.onclick = async () => {
        const wasActive = isActive;
        // 動作中なら一旦停止
        if (wasActive) {
            stopBtn.click();
        }
        
        updateStatus('', "デバイス再スキャン中...");
        // セレクトボックス初期化とデバイス再取得
        await enumerateDevices();
        
        // 元々動いていたなら自動で再開
        if (wasActive) {
            setTimeout(() => { startBtn.click(); }, 300);
        } else {
            updateStatus('offline', "デバイスをリセットしました");
        }
    };

    // 各種セレクトボックス変更時に音量を動的反映
    const applyLiveAudioSettings = () => {
        if (gainNode && audioContext && audioContext.state !== 'closed') {
            const boostVal = parseFloat(boostSelect.value);
            const sensitivityVal = parseFloat(sensitivitySelect.value) / 50.0;
            gainNode.gain.value = boostVal * sensitivityVal;
        }
    };
    sensitivitySelect.onchange = applyLiveAudioSettings;
    boostSelect.onchange = applyLiveAudioSettings;

    // 初期化処理
    initSelectOptions();
    enumerateDevices();
</script>

</body>
</html>
