<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逐語録（Android完全対応版）</title>
    <style>
        :root { --primary: #007bff; --danger: #dc3545; --success: #28a745; --warning: #ffc107; --secondary: #6c757d; --info: #17a2b8; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; background: #f4f7f9; max-width: 800px; margin: auto; color: #333; }
        .card { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 15px; font-size: 1.2em; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .conn-status { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; font-weight: bold; font-size: 0.9em; }
        .indicator { width: 12px; height: 12px; border-radius: 50%; background: #ccc; }
        .online { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .connecting { background: var(--warning); animation: blink 1s infinite; }
        .error { background: var(--danger); }
        @keyframes blink { 50% { opacity: 0.5; } }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 16px; background: #fff; cursor: pointer; }
        .setting-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #eee; }
        .setting-label { display: flex; justify-content: space-between; font-size: 0.85em; font-weight: bold; color: #555; align-items: center; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        button { flex: 1; min-width: 80px; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; transition: 0.2s; color: white; }
        #start { background: var(--primary); }
        #stop { background: var(--danger); }
        #copy { background: var(--info); }
        #save { background: var(--success); }
        #clear { background: var(--secondary); }
        button:disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.6; }
        .status-area { font-size: 0.85em; text-align: center; margin-bottom: 15px; padding: 8px; background: #fff3cd; border-radius: 6px; color: #856404; min-height: 1.2em; }
        #output-box { width: 100%; height: 500px; padding: 20px; border-radius: 12px; border: 1px solid #eef; background: #fdfdfd; overflow-y: auto; line-height: 1.8; font-size: 16px; box-sizing: border-box; }
        #final-span { color: #222; white-space: pre-wrap; }
        #interim-span { color: #999; font-style: italic; }

        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(14px); }
    </style>
</head>
<body>

<div class="card">
    <h2>逐語録（Android完全対応版）</h2>
    <div class="conn-status">
        <div id="indicator" class="indicator"></div>
        <span id="conn-text">音声認識：待機中</span>
    </div>
    <select id="mic-select">
        <option value="">-- マイクを選択（変更時に自動適用） --</option>
    </select>
    <div class="setting-box">
        <div class="setting-label" style="margin-bottom: 12px;">
            <span>感度調整（倍率）</span>
            <select id="gain-select" style="width: auto; margin-bottom: 0; padding: 5px 10px; font-size: 14px;">
                <option value="1">1 (標準)</option>
                <option value="2" selected>2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10 (最大)</option>
            </select>
        </div>
        <div class="setting-label">
            <span>ノイズ軽減（ネイティブ自動最適化）</span>
            <label class="switch">
                <input type="checkbox" id="noise-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>
    <div class="controls">
        <button id="start">認識開始</button>
        <button id="stop" disabled>停止</button>
        <button id="copy">コピー</button>
        <button id="save">保存</button>
        <button id="clear">クリア</button>
    </div>
    <div class="status-area" id="status-display">「認識開始」を押してください。</div>
    <div id="output-box"><span id="final-span"></span><span id="interim-span"></span></div>
</div>

<script>
    const micSelect = document.getElementById('mic-select');
    const gainSelect = document.getElementById('gain-select');
    const noiseToggle = document.getElementById('noise-toggle');
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const copyBtn = document.getElementById('copy');
    const saveBtn = document.getElementById('save');
    const clearBtn = document.getElementById('clear');
    const finalSpan = document.getElementById('final-span');
    const interimSpan = document.getElementById('interim-span');
    const outputBox = document.getElementById('output-box');
    const statusDisp = document.getElementById('status-display');
    const indicator = document.getElementById('indicator');
    const connText = document.getElementById('conn-text');

    let recognition = null;
    let currentStream = null;
    let isActive = false;
    let restartTimer = null;
    let configTimeout = null;
    let watchDogTimer = null; // バックグラウンド生存確認用
    
    // パフォーマンス・重複・文字落ち対策用バッファ
    let finalParagraphs = []; 
    let confirmedSet = new Set();
    let processedIndices = new Set();
    let lastConfirmedText = "";
    let lastEventTime = Date.now();

    function updateStatus(type, msg) {
        statusDisp.innerText = msg;
        indicator.className = "indicator " + type;
        if(type === 'online') { 
            connText.innerText = "音声認識：マイクON（お話しください）"; 
            statusDisp.style.background = "#d4edda"; 
        } else if(type === 'error') { 
            connText.innerText = "音声認識：エラー停止"; 
            statusDisp.style.background = "#f8d7da"; 
        } else if(type === 'connecting') {
            connText.innerText = "音声認識 : 接続準備中..."; 
            statusDisp.style.background = "#fff3cd"; 
        } else { 
            connText.innerText = "音声認識：停止中"; 
            statusDisp.style.background = "#f8f9fa"; 
        }
    }

    async function refreshDevices() {
        try {
            if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return;
            const devices = await navigator.mediaDevices.enumerateDevices();
            const audioInputs = devices.filter(d => d.kind === 'audioinput');
            const currentVal = micSelect.value;
            micSelect.innerHTML = '';
            
            audioInputs.forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = d.deviceId; 
                opt.text = d.label || `マイク ${i + 1}`;
                micSelect.appendChild(opt);
            });
            if(currentVal && Array.from(micSelect.options).some(o => o.value === currentVal)) {
                micSelect.value = currentVal;
            }
        } catch (e) {}
    }

    // Android雪だるま重複を厳密に切り落とす前方一致判定
    function getOverlapLength(str1, str2) {
        const minLen = Math.min(str1.length, str2.length);
        let overlap = 0;
        for (let i = 1; i <= minLen; i++) {
            if (str1.slice(-i) === str2.slice(0, i)) {
                overlap = i;
            }
        }
        return overlap;
    }

    async function startSpeechEngine() {
        if (!isActive || recognition) return;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            updateStatus('error', "音声認識非対応のブラウザです。");
            return;
        }

        // マイクストリームの明示的確保（デバイス変更＆ネイティブ最適化）
        try {
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
            }
            const constraints = {
                audio: {
                    echoCancellation: noiseToggle.checked,
                    noiseSuppression: noiseToggle.checked,
                    autoGainControl: true
                }
            };
            if (micSelect.value) {
                constraints.audio.deviceId = { exact: micSelect.value };
            }
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        } catch (err) {
            console.error("Stream確保失敗（認識処理は続行）:", err);
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = true; 

        recognition.onstart = () => {
            updateStatus('online', "認識中：声をしっかり拾っています。");
            lastEventTime = Date.now();
            startWatchdog();
        };

        recognition.onresult = (e) => {
            lastEventTime = Date.now();
            let interimText = '';
            let hasNewFinal = false;

            for (let i = e.resultIndex; i < e.results.length; i++) {
                const result = e.results[i];
                let transcript = result[0].transcript.trim();

                if (transcript === "") continue;
                const cleanText = transcript.replace(/[\s。、]/g, "");

                if (result.isFinal) {
                    if (processedIndices.has(i)) continue;
                    processedIndices.add(i);

                    if (confirmedSet.has(cleanText)) continue;

                    // Android特有の過去確定文巻き込み（重複）を高度にカット
                    if (lastConfirmedText) {
                        const cleanLast = lastConfirmedText.replace(/[\s。、]/g, "");
                        const overlap = getOverlapLength(cleanLast, cleanText);
                        if (overlap > 0) {
                            let rawOverlap = 0;
                            let cleanIdx = 0;
                            for(let j = 0; j < transcript.length; j++) {
                                if (!/[\s。、]/.test(transcript[j])) {
                                    cleanIdx++;
                                }
                                if (cleanIdx > overlap) {
                                    rawOverlap = j;
                                    break;
                                }
                            }
                            if (rawOverlap > 0 || cleanIdx <= overlap) {
                                transcript = transcript.substring(rawOverlap || transcript.length).trim();
                            }
                        }
                    }

                    if (transcript === "") continue;

                    confirmedSet.add(cleanText);
                    lastConfirmedText = result[0].transcript.trim(); 

                    if (!/[。？！?!]$/.test(transcript)) transcript += "。";
                    
                    finalParagraphs.push(transcript);
                    hasNewFinal = true;
                } else {
                    if (!processedIndices.has(i) && !confirmedSet.has(cleanText)) {
                        interimText += transcript;
                    }
                }
            }

            // 高速レンダリング（DOMバッチ処理）
            if (hasNewFinal) {
                finalSpan.textContent = finalParagraphs.join("\n");
                interimSpan.textContent = '';
                outputBox.scrollTop = outputBox.scrollHeight;
            } else {
                interimSpan.textContent = interimText;
                if (interimText) {
                    outputBox.scrollTop = outputBox.scrollHeight;
                }
            }
        };

        recognition.onend = () => {
            recognition = null;
            processedIndices.clear(); 
            stopWatchdog();
            
            if (isActive) {
                updateStatus('connecting', "無音による一時切断。2秒後に安全に自動復帰します...");
                clearTimeout(restartTimer);
                restartTimer = setTimeout(() => {
                    if (isActive) startSpeechEngine();
                }, 2000); 
            }
        };

        recognition.onerror = (ev) => {
            if (ev.error === 'not-allowed') {
                updateStatus('error', "マイク権限がありません。");
                stopSpeechEngine();
            } else if (ev.error === 'network') {
                lastEventTime = Date.now(); // ネットワーク遮断時も復帰を促す
            }
        };

        try {
            recognition.start();
        } catch(e) {
            recognition = null;
        }
    }

    // Androidのバックグラウンドサイレント死を検知・即復帰させるウォッチドッグ
    function startWatchdog() {
        stopWatchdog();
        watchDogTimer = setInterval(() => {
            // 25秒間完全にイベントが無反応な場合、Android側でエンジンがハングしているとみなし強制再起動
            if (isActive && (Date.now() - lastEventTime > 25000)) {
                lastEventTime = Date.now();
                if (recognition) {
                    try { recognition.stop(); } catch(e){}
                }
            }
        }, 10000);
    }

    function stopWatchdog() {
        if (watchDogTimer) {
            clearInterval(watchDogTimer);
            watchDogTimer = null;
        }
    }

    function stopSpeechEngine() {
        isActive = false; 
        clearTimeout(restartTimer);
        stopWatchdog();
        startBtn.disabled = false;
        stopBtn.disabled = true;
        updateStatus('', "停止しました。");
        
        if (recognition) {
            try {
                recognition.onstart = null;
                recognition.onresult = null;
                recognition.onend = null;
                recognition.onerror = null;
                recognition.stop();
            } catch(e){}
            recognition = null;
        }
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
            currentStream = null;
        }
        interimSpan.textContent = "";
    }

    function handleConfigChange() {
        if (!isActive) return;
        stopSpeechEngine();
        isActive = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        clearTimeout(configTimeout);
        configTimeout = setTimeout(() => {
            if (isActive) startSpeechEngine();
        }, 500);
    }

    // アプリがバックグラウンドから復帰した際に認識を安全に再同期
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && isActive && !recognition) {
            lastEventTime = Date.now();
            startSpeechEngine();
        }
    });

    startBtn.onclick = () => {
        isActive = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        confirmedSet.clear();
        processedIndices.clear();
        lastConfirmedText = "";
        updateStatus('connecting', "マイク起動中...");
        startSpeechEngine();
    };

    stopBtn.onclick = () => {
        stopSpeechEngine();
    };

    micSelect.onchange = handleConfigChange;
    gainSelect.onchange = handleConfigChange;
    noiseToggle.onchange = handleConfigChange;

    copyBtn.onclick = async () => {
        const text = finalSpan.textContent;
        if (!text.trim()) return;
        try {
            await navigator.clipboard.writeText(text);
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "コピー完了！";
            setTimeout(() => copyBtn.innerText = originalText, 2000);
        } catch (err) {
            alert("長押ししてコピーしてください：\n\n" + text);
        }
    };

    saveBtn.onclick = () => {
        const text = finalSpan.textContent;
        if (!text.trim()) return;
        const now = new Date();
        const timestamp = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + '_' + String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0');
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `逐語録_${timestamp}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    };

    clearBtn.onclick = () => {
        if (confirm("テキストをすべて消去しますか？")) {
            finalSpan.textContent = ""; 
            interimSpan.textContent = "";
            finalParagraphs = [];
            confirmedSet.clear();
            processedIndices.clear();
            lastConfirmedText = "";
        }
    };

    window.onload = async () => {
        try {
            const initStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            await refreshDevices();
            initStream.getTracks().forEach(t => t.stop());
        } catch(e){}
    };
</script>
</body>
</html>
