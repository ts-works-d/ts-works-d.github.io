<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>逐語録システム（完全全画面版）</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 画面全体のスクロールを完全に禁止し、100%フィットさせる */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f1f3f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-text-size-adjust: 100%;
        }

        /* 画面に100%追従するメインコンテナ */
        .app-container {
            width: 100%;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 10px;
            display: flex;
            flex-direction: column; /* 縦並び */
        }

        /* 外枠カード（中身をFlexboxで制御） */
        .main-card {
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            min-height: 0; /* 子要素のあふれ防止 */
        }

        h2 {
            font-size: 15px;
            text-align: center;
            color: #212529;
            padding-bottom: 6px;
            margin-bottom: 6px;
            border-bottom: 1px solid #dee2e6;
            flex-shrink: 0; /* 絶対に縮まない */
        }

        /* ステータスエリア */
        .status-bar {
            width: 100%;
            padding: 8px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            border-radius: 6px;
            background-color: #fff3cd;
            color: #856404;
            margin-bottom: 6px;
            flex-shrink: 0; /* 絶対に縮まない */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 設定項目エリア（グリッドで綺麗に並べる） */
        .config-box {
            width: 100%;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 6px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            flex-shrink: 0; /* 絶対に縮まない */
        }
        .config-item {
            display: flex;
            flex-direction: column;
        }
        .config-item.full {
            grid-column: span 2;
        }
        label {
            font-size: 11px;
            font-weight: bold;
            color: #495057;
            margin-bottom: 2px;
        }
        select {
            width: 100%;
            padding: 4px 6px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            font-size: 13px;
            background-color: #ffffff;
            color: #212529;
            height: 34px;
        }

        /* 操作ボタンエリア */
        .btn-group {
            width: 100%;
            margin-bottom: 4px;
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5つのボタンを均等配置 */
            gap: 4px;
            flex-shrink: 0; /* 絶対に縮まない */
        }
        
        button {
            width: 100%;
            height: 40px;
            font-size: 12px;
            font-weight: bold;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { opacity: 0.7; }
        button:disabled { background-color: #ced4da !important; color: #6c757d !important; opacity: 0.5; cursor: not-allowed; }
        
        #start { background-color: #007bff; }
        #stop { background-color: #dc3545; }
        #copy { background-color: #17a2b8; }
        #save { background-color: #28a745; }
        #clear { background-color: #6c757d; }

        .reset-box {
            width: 100%;
            margin-bottom: 8px;
            flex-shrink: 0; /* 絶対に縮まない */
        }
        #reset-dev {
            background-color: #343a40;
            height: 28px;
            font-size: 11px;
            border-radius: 6px;
        }

        /* テキスト表示エリア（画面の残りの高さを100%自動で埋める） */
        .output-wrapper {
            flex: 1; /* 残りの高さをすべてこの要素に割り当てる */
            width: 100%;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background-color: #fafafa;
            overflow-y: auto; /* 溢れた文字だけをスクロールさせる */
            -webkit-overflow-scrolling: touch;
            padding: 12px;
            min-height: 0; /* Flexbox内のスクロールを正常に動作させる魔法のコード */
        }

        #output-text {
            font-size: 16px;
            line-height: 1.7;
            word-break: break-all;
            color: #212529;
        }
        #final-span { white-space: pre-wrap; }
        #interim-span { color: #868e96; font-style: italic; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-card">
        <h2>逐語録システム</h2>
        <div class="status-bar" id="status-display">「開始」を押してマイクを許可してください</div>
        
        <div class="config-box">
            <div class="config-item full">
                <label for="device-select">入力デバイス選択</label>
                <select id="device-select"><option value="">既定のマイク（自動選択）</option></select>
            </div>
            <div class="config-item">
                <label for="sensitivity-select">感度調整 (1-20)</label>
                <select id="sensitivity-select"></select>
            </div>
            <div class="config-item">
                <label for="boost-select">ブースト (1-20)</label>
                <select id="boost-select"></select>
            </div>
        </div>

        <div class="btn-group">
            <button id="start">開始</button>
            <button id="stop" disabled>停止</button>
            <button id="copy">コピー</button>
            <button id="save">保存</button>
            <button id="clear">クリア</button>
        </div>
        <div class="reset-box">
            <button id="reset-dev">デバイスリセット</button>
        </div>

        <div class="output-wrapper" id="scroll-container">
            <div id="output-text">
                <span id="final-span"></span><span id="interim-span"></span>
            </div>
        </div>
    </div>
</div>

<script>
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const copyBtn = document.getElementById('copy');
    const saveBtn = document.getElementById('save');
    const clearBtn = document.getElementById('clear');
    const resetDevBtn = document.getElementById('reset-dev');
    const finalSpan = document.getElementById('final-span');
    const interimSpan = document.getElementById('interim-span');
    const scrollContainer = document.getElementById('scroll-container');
    const statusDisp = document.getElementById('status-display');
    const deviceSelect = document.getElementById('device-select');
    const sensitivitySelect = document.getElementById('sensitivity-select');
    const boostSelect = document.getElementById('boost-select');

    let recognition = null;
    let isActive = false;
    let restartTimeoutId = null;
    let wakeLock = null;
    let confirmedHistory = [];

    // リスト初期化
    for(let i=1; i<=20; i++){
        const optS = document.createElement('option'); optS.value = i; optS.innerText = i; if(i===5) optS.selected = true;
        sensitivitySelect.appendChild(optS);
        const optB = document.createElement('option'); optB.value = i; optB.innerText = i; if(i===5) optB.selected = true;
        boostSelect.appendChild(optB);
    }

    function updateStatus(state, msg) {
        statusDisp.innerText = msg;
        if (state === 'online') {
            statusDisp.style.backgroundColor = "#d4edda"; statusDisp.style.color = "#155724";
        } else if (state === 'offline') {
            statusDisp.style.backgroundColor = "#e2e3e5"; statusDisp.style.color = "#383d41";
        } else {
            statusDisp.style.backgroundColor = "#fff3cd"; statusDisp.style.color = "#856404";
        }
    }

    async function initDevices() {
        try {
            const currentSelected = deviceSelect.value;
            const devices = await navigator.mediaDevices.enumerateDevices();
            deviceSelect.innerHTML = '<option value="">既定のマイク（自動選択）</option>';
            devices.forEach(device => {
                if (device.kind === 'audioinput') {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.innerText = device.label || `マイク (${device.deviceId.slice(0,5)})`;
                    if (device.deviceId === currentSelected && currentSelected !== "") {
                        option.selected = true;
                    }
                    deviceSelect.appendChild(option);
                }
            });
        } catch (e) {
            console.warn(e);
        }
    }

    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
    }
    function releaseWakeLock() {
        if (wakeLock) { wakeLock.release().then(() => wakeLock = null); }
    }

    function initRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            updateStatus('offline', "お使いの端末は音声認識に非対応です");
            return;
        }

        if (recognition) {
            try { recognition.onstart = null; recognition.onresult = null; recognition.onend = null; recognition.onerror = null; recognition.stop(); } catch(e){}
            recognition = null;
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = true; 

        recognition.onstart = () => {
            updateStatus('online', "サーバー接続中：お話しください");
            requestWakeLock();
        };

        recognition.onresult = (e) => {
            let interimText = '';
            for (let i = e.resultIndex; i < e.results.length; i++) {
                let transcript = e.results[i][0].transcript;
                const minLengthFilter = Math.max(0, Math.floor((6 - parseInt(sensitivitySelect.value)) / 2));
                
                if (e.results[i].isFinal) {
                    let cleanedText = transcript.trim();
                    if (cleanedText.length < minLengthFilter) continue;

                    // フィラー除去
                    const fillerRegex = /^(えーと|えーっと|えー、|あのー|あの、|えー|あの|まー|うーん|えっと)/g;
                    cleanedText = cleanedText.replace(fillerRegex, "").replace(/[、\s](えーと|えーっと|えー、|あのー|あの、|えー|あの|えっと)[、\s]?/g, " ").trim();
                    if (cleanedText === "") continue;

                    // 多重表示徹底防御フィルター
                    let isDuplicate = false;
                    const checkLength = Math.min(cleanedText.length, 6);
                    const incomingChunk = cleanedText.substring(0, checkLength);
                    for (let h = confirmedHistory.length - 1; h >= Math.max(0, confirmedHistory.length - 3); h--) {
                        if (confirmedHistory[h].includes(incomingChunk) || incomingChunk.includes(confirmedHistory[h].substring(0,3))) {
                            isDuplicate = true;
                            break;
                        }
                    }
                    if (isDuplicate) continue; 

                    confirmedHistory.push(cleanedText);
                    if (confirmedHistory.length > 10) confirmedHistory.shift();

                    // 記号・改行の重複防止挿入
                    const currentFinal = finalSpan.innerText.trim();
                    let separator = "";
                    if (currentFinal !== "") {
                        if (/[。？！?!]$/.test(currentFinal)) { separator = "\n"; } 
                        else if (/[、]$/.test(currentFinal)) { separator = " "; } 
                        else { separator = "。\n"; }
                    }
                    if (!/[。？！?!、]$/.test(cleanedText)) { cleanedText += "。"; }

                    finalSpan.innerText += separator + cleanedText;
                } else {
                    interimText += transcript;
                }
            }
            interimSpan.innerText = interimText;
            scrollContainer.scrollTop = scrollContainer.scrollHeight;
        };

        recognition.onend = () => {
            if (isActive) {
                clearTimeout(restartTimeoutId);
                restartTimeoutId = setTimeout(() => {
                    if (isActive) {
                        initRecognition();
                        try { recognition.start(); } catch(err){}
                    }
                }, 250);
            }
        };

        recognition.onerror = (ev) => {
            if (ev.error === 'not-allowed') {
                updateStatus('offline', "マイク権限を許可してください");
                isActive = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
                deviceSelect.disabled = false;
            }
        };
    }

    startBtn.onclick = async () => {
        isActive = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        deviceSelect.disabled = true;
        updateStatus('', "音声同期中...");

        try {
            const constraints = { audio: true };
            if (deviceSelect.value) { constraints.audio = { deviceId: { exact: deviceSelect.value } }; }
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            await initDevices();
            stream.getTracks().forEach(track => track.stop());
        } catch (err) {
            updateStatus('offline', "マイクの起動に失敗しました");
            startBtn.disabled = false;
            stopBtn.disabled = true;
            deviceSelect.disabled = false;
            return;
        }

        initRecognition();
        if (recognition) {
            try { recognition.start(); } catch (e) {
                initRecognition();
                setTimeout(() => { if(isActive) recognition.start(); }, 300);
            }
        }
    };

    stopBtn.onclick = () => {
        isActive = false;
        clearTimeout(restartTimeoutId);
        startBtn.disabled = false;
        stopBtn.disabled = true;
        deviceSelect.disabled = false;
        if (recognition) { try { recognition.stop(); } catch(e){} }
        releaseWakeLock();
        updateStatus('offline', "停止しました");
    };

    copyBtn.onclick = async () => {
        const text = finalSpan.innerText;
        if (!text.trim()) return;
        try {
            await navigator.clipboard.writeText(text);
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "完了";
            setTimeout(() => copyBtn.innerText = originalText, 1200);
        } catch (err) {
            alert("長押ししてコピーしてください：\n\n" + text);
        }
    };

    saveBtn.onclick = () => {
        const text = finalSpan.innerText;
        if (!text.trim()) { alert("保存するテキストがありません"); return; }
        const now = new Date();
        const filename = `逐語録_${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}.txt`;
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8;' });
        const link = document.createElement("a");
        if (link.download !== undefined) {
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        } else {
            window.open(encodeURI("data:text/plain;charset=utf-8," + text));
        }
    };

    clearBtn.onclick = () => {
        if (confirm("表示されているテキストを消去しますか？")) {
            finalSpan.innerText = "";
            interimSpan.innerText = "";
            confirmedHistory = [];
        }
    };

    resetDevBtn.onclick = async () => {
        const activeState = isActive;
        if (activeState) stopBtn.click();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
            await initDevices();
            updateStatus('offline', "デバイスを再スキャンしました");
        } catch(e) {
            alert("マイクの使用権限を許可してください");
        }
        if (activeState) { setTimeout(() => { startBtn.click(); }, 400); }
    };

    window.addEventListener('DOMContentLoaded', async () => {
        if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) { await initDevices(); }
    });
</script>

</body>
</html>
