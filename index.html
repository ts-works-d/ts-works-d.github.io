<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>逐語録（デバイス固定・スマホ完全版）</title>
    <style>
        :root { 
            --primary: #007bff; --danger: #dc3545; --success: #28a745; 
            --secondary: #6c757d; --info: #17a2b8; --dark: #343a40;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 10px; background: #f4f7f9; color: #333; 
            width: 100vw; height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }
        .container { 
            display: flex; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; width: 100%;
        }
        .card { 
            background: #fff; padding: 12px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; flex: 1; min-height: 0;
        }
        h2 { font-size: 1.1em; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 6px; margin-bottom: 8px; }
        
        .status-area { 
            font-size: 0.85em; text-align: center; margin-bottom: 8px; padding: 8px; 
            background: #fff3cd; border-radius: 6px; color: #856404; font-weight: bold; 
        }
        
        .config-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-bottom: 8px; background: #f8f9fa; padding: 8px; border-radius: 8px;
        }
        .config-item { display: flex; flex-direction: column; gap: 2px; font-size: 0.75em; font-weight: bold; color: #555; }
        .config-item.full-width { grid-column: span 2; }
        select { padding: 5px; border-radius: 6px; border: 1px solid #ccc; font-size: 0.85em; background: #fff; width: 100%; color: #333; }
        
        .controls { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 6px; }
        button { padding: 12px 2px; font-size: 0.8em; font-weight: bold; cursor: pointer; border: none; border-radius: 6px; color: white; transition: opacity 0.2s; -webkit-tap-highlight-color: transparent; }
        #start { background: var(--primary); }
        #stop { background: var(--danger); }
        #copy { background: var(--info); }
        #save { background: var(--success); }
        #clear { background: var(--secondary); }
        #reset-dev { background: var(--dark); grid-column: span 5; padding: 6px; font-size: 0.75em; border-radius: 6px; }
        button:disabled { background: #ccc !important; opacity: 0.4; cursor: not-allowed; }
        
        #output-box { 
            flex: 1; width: 100%; padding: 12px; border-radius: 8px; 
            border: 1px solid #ddd; background: #fafafa; overflow-y: auto; 
            line-height: 1.6; font-size: 16px; min-height: 0; word-break: break-all;
            -webkit-overflow-scrolling: touch;
        }
        #final-span { color: #111; white-space: pre-wrap; }
        #interim-span { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>逐語録システム（スマホ完全版）</h2>
        <div class="status-area" id="status-display">「開始」を押してマイクを許可してください</div>
        
        <div class="config-grid">
            <div class="config-item full-width">
                <label for="device-select">入力デバイス選択</label>
                <select id="device-select"><option value="">既定のマイク（自動選択）</option></select>
            </div>
            <div class="config-item">
                <label for="sensitivity-select">感度調整 (1-20)</label>
                <select id="sensitivity-select"></select>
            </div>
            <div class="config-item">
                <label for="boost-select">ブースト (1-20)</label>
                <select id="boost-select"></select>
            </div>
        </div>

        <div class="controls">
            <button id="start">開始</button>
            <button id="stop" disabled>停止</button>
            <button id="copy">コピー</button>
            <button id="save">保存</button>
            <button id="clear">クリア</button>
            <button id="reset-dev">デバイスリセット</button>
        </div>

        <div id="output-box">
            <span id="final-span"></span><span id="interim-span"></span>
        </div>
    </div>
</div>

<script>
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const copyBtn = document.getElementById('copy');
    const saveBtn = document.getElementById('save');
    const clearBtn = document.getElementById('clear');
    const resetDevBtn = document.getElementById('reset-dev');
    const finalSpan = document.getElementById('final-span');
    const interimSpan = document.getElementById('interim-span');
    const outputBox = document.getElementById('output-box');
    const statusDisp = document.getElementById('status-display');
    const deviceSelect = document.getElementById('device-select');
    const sensitivitySelect = document.getElementById('sensitivity-select');
    const boostSelect = document.getElementById('boost-select');

    let recognition = null;
    let isActive = false;
    let restartTimeoutId = null;
    let wakeLock = null;

    // セレクトボックス初期化 (初期値5)
    for(let i=1; i<=20; i++){
        const optS = document.createElement('option'); optS.value = i; optS.innerText = i; if(i===5) optS.selected = true;
        sensitivitySelect.appendChild(optS);
        const optB = document.createElement('option'); optB.value = i; optB.innerText = i; if(i===5) optB.selected = true;
        boostSelect.appendChild(optB);
    }

    function updateStatus(state, msg) {
        statusDisp.innerText = msg;
        if (state === 'online') {
            statusDisp.style.background = "#d4edda"; statusDisp.style.color = "#155724";
        } else if (state === 'offline') {
            statusDisp.style.background = "#e2e3e5"; statusDisp.style.color = "#383d41";
        } else {
            statusDisp.style.background = "#fff3cd"; statusDisp.style.color = "#856404";
        }
    }

    // デバイス名一覧の取得（選択状態を記憶して維持するよう修正）
    async function initDevices() {
        try {
            const currentSelected = deviceSelect.value; // 現在選ばれているIDを退避
            const devices = await navigator.mediaDevices.enumerateDevices();
            
            deviceSelect.innerHTML = '<option value="">既定のマイク（自動選択）</option>';
            let hasSelectedDeviceStill = false;

            devices.forEach(device => {
                if (device.kind === 'audioinput') {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.innerText = device.label || `マイク (${device.deviceId.slice(0,5)})`;
                    if (device.deviceId === currentSelected && currentSelected !== "") {
                        option.selected = true;
                        hasSelectedDeviceStill = true;
                    }
                    deviceSelect.appendChild(option);
                }
            });
        } catch (e) {
            console.warn("デバイス一覧の取得に失敗:", e);
        }
    }

    // スリープ防止
    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
    }
    function releaseWakeLock() {
        if (wakeLock) { wakeLock.release().then(() => wakeLock = null); }
    }

    // 音声認識の初期化
    function initRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            updateStatus('offline', "お使いのブラウザ・スマホは音声認識に非対応です");
            return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = true; 

        recognition.onstart = () => {
            updateStatus('online', "認識中：お話しください");
            requestWakeLock();
        };

        let lastTranscript = "";

        recognition.onresult = (e) => {
            let interimText = '';
            for (let i = e.resultIndex; i < e.results.length; i++) {
                let transcript = e.results[i][0].transcript;
                const minLengthFilter = Math.max(0, Math.floor((6 - parseInt(sensitivitySelect.value)) / 2)); 
                
                if (e.results[i].isFinal) {
                    let cleanedText = transcript.trim();
                    if (cleanedText.length < minLengthFilter) continue; 

                    // フィラー除去
                    const fillerRegex = /^(えーと|えーっと|えー、|あのー|あの、|えー|あの|まー|うーん|えっと)/g;
                    cleanedText = cleanedText.replace(fillerRegex, "").replace(/[、\s](えーと|えーっと|えー、|あのー|あの、|えー|あの|えっと)[、\s]?/g, " ").trim();
                    
                    if (cleanedText === "" || cleanedText === lastTranscript) continue;
                    lastTranscript = cleanedText;

                    const currentFinal = finalSpan.innerText.trim();
                    let separator = "";
                    
                    if (currentFinal !== "") {
                        if (/[。？！?!]$/.test(currentFinal)) {
                            separator = "\n"; 
                        } else if (/[、]$/.test(currentFinal)) {
                            separator = " ";
                        } else {
                            separator = "。\n";
                        }
                    }
                    
                    if (!/[。？！?!、]$/.test(cleanedText)) {
                        cleanedText += "。";
                    }

                    finalSpan.innerText += separator + cleanedText;
                } else {
                    interimText += transcript;
                }
            }
            interimSpan.innerText = interimText;
            outputBox.scrollTop = outputBox.scrollHeight;
        };

        recognition.onend = () => {
            if (isActive) {
                clearTimeout(restartTimeoutId);
                restartTimeoutId = setTimeout(() => {
                    if (isActive && recognition) {
                        try { 
                            recognition.start(); 
                        } catch(e) {
                            initRecognition();
                            try { recognition.start(); } catch(err){}
                        }
                    }
                }, 200);
            }
        };

        recognition.onerror = (ev) => {
            if (ev.error === 'not-allowed') {
                updateStatus('offline', "マイクの使用が拒否されています");
                isActive = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
            console.log("認識中断理由:", ev.error);
        };
    }

    // 開始ボタン
    startBtn.onclick = async () => {
        isActive = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        deviceSelect.disabled = true;
        updateStatus('', "マイクを起動中...");

        // 選択されたデバイスIDを記憶しておく
        const selectedDeviceId = deviceSelect.value;

        try {
            const constraints = { audio: true };
            if (selectedDeviceId) {
                constraints.audio = { deviceId: { exact: selectedDeviceId } };
            }
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            
            // 重要：ここでリストを再スキャンしても、直前に選んでいたデバイスが外れないよう内部で維持されます
            await initDevices();
            
            stream.getTracks().forEach(track => track.stop());
        } catch (err) {
            updateStatus('offline', "マイクの起動に失敗しました");
            startBtn.disabled = false;
            stopBtn.disabled = true;
            deviceSelect.disabled = false;
            return;
        }

        if (!recognition) {
            initRecognition();
        }

        if (recognition) {
            try {
                // 音声認識エンジンにデバイスIDの制約を直接渡すことはできませんが、
                // 直前のgetUserMedia呼び出しによってOS・ブラウザ側でマイクストリームの優先権が固定されます
                recognition.start();
            } catch (e) {
                try { recognition.stop(); } catch(ex){}
                setTimeout(() => { if(isActive) recognition.start(); }, 300);
            }
        }
    };

    // 停止ボタン
    stopBtn.onclick = () => {
        isActive = false;
        clearTimeout(restartTimeoutId);
        startBtn.disabled = false;
        stopBtn.disabled = true;
        deviceSelect.disabled = false;
        
        if (recognition) {
            try { recognition.stop(); } catch(e){}
        }
        releaseWakeLock();
        updateStatus('offline', "停止しました");
    };

    // コピーボタン
    copyBtn.onclick = async () => {
        const text = finalSpan.innerText;
        if (!text.trim()) return;
        try {
            await navigator.clipboard.writeText(text);
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "完了";
            setTimeout(() => copyBtn.innerText = originalText, 1200);
        } catch (err) {
            alert("長押ししてコピーしてください：\n\n" + text);
        }
    };

    // 保存ボタン
    saveBtn.onclick = () => {
        const text = finalSpan.innerText;
        if (!text.trim()) {
            alert("保存するテキストがありません");
            return;
        }

        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const date = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const filename = `逐語録_${year}${month}${date}_${hours}${minutes}.txt`;

        const blob = new Blob([text], { type: 'text/plain;charset=utf-8;' });
        
        const link = document.createElement("a");
        if (link.download !== undefined) {
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        } else {
            window.open(encodeURI("data:text/plain;charset=utf-8," + text));
        }
    };

    // クリアボタン
    clearBtn.onclick = () => {
        if (confirm("表示されているテキストを消去しますか？")) {
            finalSpan.innerText = "";
            interimSpan.innerText = "";
        }
    };

    // デバイスリセット
    resetDevBtn.onclick = async () => {
        const activeState = isActive;
        if (activeState) stopBtn.click();
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
            await initDevices();
            updateStatus('offline', "デバイスをリセットしました");
        } catch(e) {
            alert("マイクへのアクセス権限をオンにしてください");
        }

        if (activeState) {
            setTimeout(() => { startBtn.click(); }, 400);
        }
    };

    // 初回表示（一度マイクの許可を取ってからリストを作る）
    window.addEventListener('DOMContentLoaded', async () => {
        // 最初のロード時にマイクが許可されていればデバイス名を取得
        if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
            await initDevices();
        }
    });
</script>

</body>
</html>
