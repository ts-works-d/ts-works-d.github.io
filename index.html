<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>逐語録システム（高精度・完全レスポンシブ版）</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #f1f3f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-text-size-adjust: 100%;
        }

        /* 画面全体を覆う絶対配置コンテナ（スマホ・タブレット全解像度対応） */
        .app-container {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            padding: 12px; max-width: 800px; margin: 0 auto;
            display: block;
        }

        .main-card {
            position: relative; width: 100%; height: 100%;
            background: #ffffff; border-radius: 14px;
            padding: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        h2 {
            font-size: 16px; text-align: center; color: #212529;
            height: 24px; line-height: 24px; margin-bottom: 8px;
            border-bottom: 1px solid #dee2e6; letter-spacing: 0.5px;
        }

        /* ステータスエリア */
        .status-bar {
            width: 100%; height: 36px; line-height: 20px; padding: 8px;
            font-size: 13px; font-weight: bold; text-align: center;
            border-radius: 6px; background-color: #fff3cd; color: #856404;
            margin-bottom: 8px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
        }

        /* 設定項目エリア（テーブルレイアウトで全端末で崩れない仕様に） */
        .config-box {
            width: 100%; background: #f8f9fa; padding: 8px;
            border-radius: 8px; margin-bottom: 8px; display: table;
        }
        .config-row { display: table-row; }
        .config-cell { display: table-cell; padding: 4px; vertical-align: middle; }
        .config-cell.half { width: 50%; }
        label { font-size: 11px; font-weight: bold; color: #495057; display: block; margin-bottom: 2px; }
        select {
            width: 100%; padding: 6px; border-radius: 6px; border: 1px solid #ced4da;
            font-size: 13px; background-color: #ffffff; color: #212529; height: 34px;
        }

        /* ボタンコントロールエリア */
        .btn-group { width: 100%; margin-bottom: 6px; display: table; table-layout: fixed; }
        .btn-cell { display: table-cell; padding: 2px; }
        
        button {
            width: 100%; height: 42px; font-size: 13px; font-weight: bold;
            color: #ffffff; border: none; border-radius: 6px; cursor: pointer;
            transition: opacity 0.15s ease; -webkit-tap-highlight-color: transparent;
        }
        button:active { opacity: 0.7; }
        button:disabled { background-color: #ced4da !important; color: #6c757d !important; opacity: 0.5; cursor: not-allowed; }
        
        #start { background-color: #007bff; }
        #stop { background-color: #dc3545; }
        #copy { background-color: #17a2b8; }
        #save { background-color: #28a745; }
        #clear { background-color: #6c757d; }

        .reset-box { width: 100%; margin-bottom: 8px; }
        #reset-dev { background-color: #343a40; height: 30px; font-size: 11px; border-radius: 4px; }

        /* スクロールテキストエリア（残りの高さを完全に自動計算） */
        .output-wrapper {
            position: absolute;
            top: 236px; /* 上部UI要素の合計高さ＋マージン */
            bottom: 12px; left: 12px; right: 12px;
            border: 1px solid #dee2e6; border-radius: 8px;
            background-color: #fafafa; overflow-y: auto;
            -webkit-overflow-scrolling: touch; padding: 14px;
        }
        
        /* 画面が横向き（ランドスケープ）などの場合に配置を最適化する調整 */
        @media (max-height: 500px) {
            .status-bar { display: none; }
            .output-wrapper { top: 192px; }
        }

        #output-text { font-size: 16px; line-height: 1.7; word-break: break-all; color: #212529; }
        #final-span { white-space: pre-wrap; }
        #interim-span { color: #868e96; font-style: italic; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-card">
        <h2>逐語録システム</h2>
        <div class="status-bar" id="status-display">「開始」を押してマイクを許可してください</div>
        
        <div class="config-box">
            <div class="config-row">
                <div class="config-cell" colspan="2">
                    <label for="device-select">入力デバイス選択</label>
                    <select id="device-select"><option value="">既定のマイク（自動選択）</option></select>
                </div>
            </div>
            <div class="config-row">
                <div class="config-cell half">
                    <label for="sensitivity-select">感度調整 (1-20)</label>
                    <select id="sensitivity-select"></select>
                </div>
                <div class="config-cell half">
                    <label for="boost-select">ブースト (1-20)</label>
                    <select id="boost-select"></select>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <div class="btn-cell"><button id="start">開始</button></div>
            <div class="btn-cell"><button id="stop" disabled>停止</button></div>
            <div class="btn-cell"><button id="copy">コピー</button></div>
            <div class="btn-cell"><button id="save">保存</button></div>
            <div class="btn-cell"><button id="clear">クリア</button></div>
        </div>
        <div class="reset-box">
            <button id="reset-dev">デバイスリセット</button>
        </div>

        <div class="output-wrapper" id="scroll-container">
            <div id="output-text">
                <span id="final-span"></span><span id="interim-span"></span>
            </div>
        </div>
    </div>
</div>

<script>
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const copyBtn = document.getElementById('copy');
    const saveBtn = document.getElementById('save');
    const clearBtn = document.getElementById('clear');
    const resetDevBtn = document.getElementById('reset-dev');
    const finalSpan = document.getElementById('final-span');
    const interimSpan = document.getElementById('interim-span');
    const scrollContainer = document.getElementById('scroll-container');
    const statusDisp = document.getElementById('status-display');
    const deviceSelect = document.getElementById('device-select');
    const sensitivitySelect = document.getElementById('sensitivity-select');
    const boostSelect = document.getElementById('boost-select');

    let recognition = null;
    let isActive = false;
    let restartTimeoutId = null;
    let wakeLock = null;
    
    // 多重表示・重複防止用の履歴保持用配列
    let confirmedHistory = [];

    // セレクトボックス初期化 (初期値5)
    for(let i=1; i<=20; i++){
        const optS = document.createElement('option'); optS.value = i; optS.innerText = i; if(i===5) optS.selected = true;
        sensitivitySelect.appendChild(optS);
        const optB = document.createElement('option'); optB.value = i; optB.innerText = i; if(i===5) optB.selected = true;
        boostSelect.appendChild(optB);
    }

    function updateStatus(state, msg) {
        statusDisp.innerText = msg;
        if (state === 'online') {
            statusDisp.style.backgroundColor = "#d4edda"; statusDisp.style.color = "#155724";
        } else if (state === 'offline') {
            statusDisp.style.backgroundColor = "#e2e3e5"; statusDisp.style.color = "#383d41";
        } else {
            statusDisp.style.backgroundColor = "#fff3cd"; statusDisp.style.color = "#856404";
        }
    }

    // デバイス名一覧の取得（選択固定ロジック付）
    async function initDevices() {
        try {
            const currentSelected = deviceSelect.value;
            const devices = await navigator.mediaDevices.enumerateDevices();
            
            deviceSelect.innerHTML = '<option value="">既定のマイク（自動選択）</option>';
            devices.forEach(device => {
                if (device.kind === 'audioinput') {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.innerText = device.label || `マイク (${device.deviceId.slice(0,5)})`;
                    if (device.deviceId === currentSelected && currentSelected !== "") {
                        option.selected = true;
                    }
                    deviceSelect.appendChild(option);
                }
            });
        } catch (e) {
            console.warn("デバイス取得制限:", e);
        }
    }

    // スリープ防止
    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
    }
    function releaseWakeLock() {
        if (wakeLock) { wakeLock.release().then(() => wakeLock = null); }
    }

    // 音声認識の初期化
    function initRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            updateStatus('offline', "お使いの端末は音声認識に非対応です");
            return;
        }

        // 既存のオブジェクトがあれば完全に明示破棄（多重起動による多重表示バグを防止）
        if (recognition) {
            try { recognition.onstart = null; recognition.onresult = null; recognition.onend = null; recognition.onerror = null; recognition.stop(); } catch(e){}
            recognition = null;
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = true; 

        recognition.onstart = () => {
            updateStatus('online', "サーバー接続中：お話しください");
            requestWakeLock();
        };

        recognition.onresult = (e) => {
            let interimText = '';
            
            for (let i = e.resultIndex; i < e.results.length; i++) {
                let transcript = e.results[i][0].transcript;
                
                // 感度調整フィルター（感度が低い＝ノイズ除去。短い不鮮明な音をスキップ）
                const minLengthFilter = Math.max(0, Math.floor((6 - parseInt(sensitivitySelect.value)) / 2));
                
                if (e.results[i].isFinal) {
                    let cleanedText = transcript.trim();
                    if (cleanedText.length < minLengthFilter) continue;

                    // フィラー（えー、あの等）の除去
                    const fillerRegex = /^(えーと|えーっと|えー、|あのー|あの、|えー|あの|まー|うーん|えっと)/g;
                    cleanedText = cleanedText.replace(fillerRegex, "").replace(/[、\s](えーと|えーっと|えー、|あのー|あの、|えー|あの|えっと)[、\s]?/g, " ").trim();
                    if (cleanedText === "") continue;

                    // 【超重要】多重表示（重複）徹底防御フィルター
                    // 直近に確定した15文字を抽出し、今回確定したテキストの冒頭部分と酷似・重複している場合は多重表示バグとみなして破棄
                    let isDuplicate = false;
                    const checkLength = Math.min(cleanedText.length, 6);
                    const incomingChunk = cleanedText.substring(0, checkLength);
                    
                    for (let h = confirmedHistory.length - 1; h >= Math.max(0, confirmedHistory.length - 3); h--) {
                        if (confirmedHistory[h].includes(incomingChunk) || incomingChunk.includes(confirmedHistory[h].substring(0,3))) {
                            isDuplicate = true;
                            break;
                        }
                    }
                    if (isDuplicate) {
                        console.log("多重表示を検知しブロックしました: " + cleanedText);
                        continue; 
                    }

                    // 履歴の更新（最大10件保持）
                    confirmedHistory.push(cleanedText);
                    if (confirmedHistory.length > 10) confirmedHistory.shift();

                    // 「、」「。」「改行」の自動挿入（重複回避付き）
                    const currentFinal = finalSpan.innerText.trim();
                    let separator = "";
                    
                    if (currentFinal !== "") {
                        if (/[。？！?!]$/.test(currentFinal)) {
                            separator = "\n"; 
                        } else if (/[、]$/.test(currentFinal)) {
                            separator = " ";
                        } else {
                            separator = "。\n";
                        }
                    }
                    
                    if (!/[。？！?!、]$/.test(cleanedText)) {
                        cleanedText += "。";
                    }

                    finalSpan.innerText += separator + cleanedText;
                } else {
                    interimText += transcript;
                }
            }
            interimSpan.innerText = interimText;
            
            // 自動最下部スクロール
            scrollContainer.scrollTop = scrollContainer.scrollHeight;
        };

        // 切断時の安全自動復旧ループ（多重起動を防ぐためオブジェクトを都度リセット）
        recognition.onend = () => {
            if (isActive) {
                clearTimeout(restartTimeoutId);
                restartTimeoutId = setTimeout(() => {
                    if (isActive) {
                        initRecognition(); // 完全にクリーンな新規オブジェクトを再構築
                        try { recognition.start(); } catch(err){ console.error("再起動失敗:", err); }
                    }
                }, 250); // 前のセッションが完全に消滅するのを待つ安全マージン
            }
        };

        recognition.onerror = (ev) => {
            console.log("システム通知:", ev.error);
            if (ev.error === 'not-allowed') {
                updateStatus('offline', "マイク権限を許可してください");
                isActive = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
                deviceSelect.disabled = false;
            }
        };
    }

    // 開始ボタン
    startBtn.onclick = async () => {
        isActive = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        deviceSelect.disabled = true;
        updateStatus('', "音声同期中...");

        const selectedDeviceId = deviceSelect.value;

        try {
            const constraints = { audio: true };
            if (selectedDeviceId) {
                constraints.audio = { deviceId: { exact: selectedDeviceId } };
            }
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            await initDevices();
            stream.getTracks().forEach(track => track.stop());
        } catch (err) {
            updateStatus('offline', "マイクが接続されていないか、権限がありません");
            startBtn.disabled = false;
            stopBtn.disabled = true;
            deviceSelect.disabled = false;
            return;
        }

        // 初期化して開始
        initRecognition();
        if (recognition) {
            try {
                recognition.start();
            } catch (e) {
                initRecognition();
                setTimeout(() => { if(isActive) recognition.start(); }, 300);
            }
        }
    };

    // 停止ボタン
    stopBtn.onclick = () => {
        isActive = false;
        clearTimeout(restartTimeoutId);
        startBtn.disabled = false;
        stopBtn.disabled = true;
        deviceSelect.disabled = false;
        
        if (recognition) {
            try { recognition.stop(); } catch(e){}
        }
        releaseWakeLock();
        updateStatus('offline', "停止しました");
    };

    // コピーボタン
    copyBtn.onclick = async () => {
        const text = finalSpan.innerText;
        if (!text.trim()) return;
        try {
            await navigator.clipboard.writeText(text);
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "完了";
            setTimeout(() => copyBtn.innerText = originalText, 1200);
        } catch (err) {
            alert("長押ししてコピーしてください：\n\n" + text);
        }
    };

    // 保存ボタン
    saveBtn.onclick = () => {
        const text = finalSpan.innerText;
        if (!text.trim()) {
            alert("保存するテキストがありません");
            return;
        }

        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const date = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const filename = `逐語録_${year}${month}${date}_${hours}${minutes}.txt`;

        const blob = new Blob([text], { type: 'text/plain;charset=utf-8;' });
        const link = document.createElement("a");
        if (link.download !== undefined) {
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        } else {
            window.open(encodeURI("data:text/plain;charset=utf-8," + text));
        }
    };

    // クリアボタン
    clearBtn.onclick = () => {
        if (confirm("表示されているテキストを消去しますか？")) {
            finalSpan.innerText = "";
            interimSpan.innerText = "";
            confirmedHistory = [];
        }
    };

    // デバイスリセット
    resetDevBtn.onclick = async () => {
        const activeState = isActive;
        if (activeState) stopBtn.click();
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
            await initDevices();
            updateStatus('offline', "デバイスを再スキャンしました");
        } catch(e) {
            alert("マイクの使用権限を許可してください");
        }

        if (activeState) {
            setTimeout(() => { startBtn.click(); }, 400);
        }
    };

    // ロード時に可能な限り初期デバイス一覧をスキャン
    window.addEventListener('DOMContentLoaded', async () => {
        if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
            await initDevices();
        }
    });
</script>

</body>
</html>
